<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>StatutParc - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Consultation du statut des parcs La Clé du Parc."
  >

  <script src="../../config.js"></script>
  <script src="../A_STRUCTURE/guard-admin.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" +
          String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        if (typeof config.adminUrl === "function") {
          return config.adminUrl(path);
        }

        return construireUrl(adminBase, path);
      };

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return construireUrl(publicBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return construireUrl(objetBase, path);
      };

      [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css"
      ].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(path) +
          '">'
        );
      });

      document.write(
        '<link rel="stylesheet" href="' +
        window.LCDP_urlAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/table-lecture-admin.css"
        ) +
        '">'
      );
    })();
  </script>
</head>

<body class="lcdp-page-statutparc">
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main" id="lcdp-main-admin" hidden>
      <section
        class="lcdp-page-section"
        aria-label="Statut des parcs"
      >
        <div class="lcdp-page-container">
          <div id="lcdp-table-lecture-admin-slot"></div>
        </div>
      </section>
    </main>

  </div>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function urlAdmin(path) {
        if (typeof window.LCDP_urlAdmin === "function") {
          return window.LCDP_urlAdmin(path);
        }

        return path;
      }

      function urlPublic(path) {
        if (typeof window.LCDP_urlPublic === "function") {
          return window.LCDP_urlPublic(path);
        }

        return path;
      }

      function urlObjet(path) {
        if (typeof window.LCDP_urlObjet === "function") {
          return window.LCDP_urlObjet(path);
        }

        return path;
      }

      function appliquerRoutes(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const path = element.dataset.siteHref || "";
          const space = element.dataset.space || "public";

          element.setAttribute(
            "href",
            space === "admin" ? urlAdmin(path) : urlPublic(path)
          );
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const path = String(element.dataset.siteSrc || "")
            .replace(/^\/?OBJET\/?/, "/");

          element.setAttribute("src", urlObjet(path));
        });
      }

      async function chargerFragment(url, label) {
        const response = await fetch(url, {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!response.ok) {
          throw new Error(label + " introuvable.");
        }

        const template = document.createElement("template");
        template.innerHTML = (await response.text()).trim();

        return template.content.cloneNode(true);
      }

      function chargerFragmentAdmin(path) {
        return chargerFragment(
          urlAdmin(path),
          "Fragment ADMIN " + path
        );
      }

      function chargerScriptAdminUneFois(path) {
        const src = urlAdmin(path);

        if (
          document.querySelector(
            `script[data-lcdp-script-admin="${path}"]`
          )
        ) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScriptAdmin = path;
          script.onload = resolve;
          script.onerror = () => reject(
            new Error("Script ADMIN introuvable : " + path)
          );
          document.body.appendChild(script);
        });
      }

      function endpointAdminData() {
        return String(
          config.workerAdminDataUrl ||
          config.WORKER_ADMIN_DATA_URL ||
          window.ADMIN_CONFIG?.API_ADMIN_DATA ||
          ""
        ).replace(/\/+$/, "");
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/box-bandeau-nav-admin.html"
        );

        slot.appendChild(fragment);
        appliquerRoutes(slot);
      }

      async function initialiserTable() {
        const slot = document.getElementById(
          "lcdp-table-lecture-admin-slot"
        );

        if (!slot) {
          return;
        }

        const fragment = await chargerFragmentAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/table-lecture-admin.html"
        );

        slot.appendChild(fragment);

        await chargerScriptAdminUneFois(
          "/ESPACE-ADMIN/A_STRUCTURE/table-lecture-admin.js"
        );

        const table = window.LCDP_TABLE_LECTURE_ADMIN;

        if (!table || typeof table.initialiser !== "function") {
          throw new Error("Objet table lecture admin indisponible.");
        }

        await table.initialiser({
          slotId: "lcdp-table-lecture-admin-slot",
          endpoint: endpointAdminData(),
          resource: "parcs-statut"
        });
      }

      async function verifierAcces() {
        const guard = window.LCDP_GUARD_ADMIN;

        if (
          !guard ||
          typeof guard.verifierAccesPageAdmin !== "function"
        ) {
          throw new Error("Garde admin centralisé indisponible.");
        }

        return guard.verifierAccesPageAdmin();
      }

      async function initialiserPage() {
        const autorise = await verifierAcces();

        if (!autorise) {
          return;
        }

        await Promise.all([
          initialiserBandeau(),
          initialiserTable()
        ]);

        const main = document.getElementById("lcdp-main-admin");

        if (main) {
          main.hidden = false;
        }
      }

      initialiserPage().catch((error) => {
        console.error(error);
      });
    })();
  </script>
</body>
</html>
