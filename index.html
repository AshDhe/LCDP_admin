<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Espace Admin - La Clé du Parc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Accès à l'espace admin La Clé du Parc.">
  <script src="./config.js"></script>
  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};
      const cible = typeof config.adminUrl === "function"
        ? config.adminUrl("/ESPACE-ADMIN/accueil-admin.html")
        : "/ESPACE-ADMIN/accueil-admin.html";

      window.location.replace(cible);
    })();
  </script>
</head>
<body>
  <p>
    Redirection vers l’espace admin.
    <a href="/ESPACE-ADMIN/accueil-admin.html">Continuer</a>
  </p>
</body>
</html>
