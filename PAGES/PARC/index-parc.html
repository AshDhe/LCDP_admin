<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Parcs - Espace Admin - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Choisir une action pour la rubrique Parc dans l'espace admin La Clé du Parc.">

  <script src="../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function joindreBaseEtChemin(baseUrl, chemin) {
        const base = nettoyerBaseUrl(baseUrl);
        const cheminNettoye = "/" + String(chemin || "").replace(/^\/+/, "");

        if (!base) {
          return cheminNettoye;
        }

        return base + cheminNettoye;
      }

      function cheminExterneOuAncre(chemin) {
        return (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://")
        );
      }

      window.ADMIN_ROOT_RELATIVE = siteRootRelative;

      window.ADMIN_BASE = nettoyerBaseUrl(
        window.ADMIN_CONFIG?.ADMIN_BASE_URL ||
        siteBaseFallback ||
        ""
      );

      window.ASSETS_BASE = nettoyerBaseUrl("https://lacleduparc.fr");

      window.construireUrlAdmin = function construireUrlAdmin(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || cheminExterneOuAncre(valeur)) {
          return valeur;
        }

        return joindreBaseEtChemin(window.ADMIN_BASE, valeur);
      };

      window.construireUrlAsset = function construireUrlAsset(chemin) {
        return joindreBaseEtChemin(window.ASSETS_BASE, chemin);
      };

      window.corrigerCheminsAdmin = function corrigerCheminsAdmin(scope) {
        const racine = scope || document;

        racine.querySelectorAll("[data-admin-href]").forEach((element) => {
          element.setAttribute("href", window.construireUrlAdmin(element.dataset.adminHref));
        });

        racine.querySelectorAll("[data-public-src]").forEach((element) => {
          element.setAttribute("src", window.construireUrlAsset(element.dataset.publicSrc));
        });
      };

      document.write(
        '<link rel="stylesheet" href="' +
        window.construireUrlAsset("/OBJETS/CSS/base.css") +
        '">'
      );

      document.write(
        '<link rel="stylesheet" href="' +
        window.construireUrlAsset("/OBJETS/CSS/bandeau-et-burger.css") +
        '">'
      );
    })();
  </script>

  <style>
    .admin-page-verrouillee .site-main {
      visibility: hidden;
    }

    .dialog-dashboard-capacite {
      width: min(92vw, 520px);
      padding: 0;
      border: 0;
      border-radius: 26px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.22);
      background: var(--color-surface);
      color: var(--color-text);
    }

    .dialog-dashboard-capacite::backdrop {
      background: rgba(24, 34, 28, 0.55);
      backdrop-filter: blur(4px);
    }

    .dialog-dashboard-capacite-contenu {
      padding: 28px;
    }

    .dialog-dashboard-capacite-contenu h2 {
      margin: 0 0 18px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    .dialog-dashboard-capacite-contenu label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--color-text);
    }

    .dialog-dashboard-capacite-contenu input {
      width: 100%;
      min-height: 54px;
      padding: 0 16px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-button);
      background: var(--color-surface);
      color: var(--color-text);
      font-family: var(--font-main);
      font-size: 18px;
    }

    .dialog-dashboard-capacite-message {
      min-height: 24px;
      margin: 10px 0 0;
      color: var(--color-error, #b00020);
      font-size: 14px;
    }

    .dialog-dashboard-capacite-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .dialog-dashboard-capacite-actions .button {
      width: 100%;
    }

    @media (min-width: 601px) {
      .dialog-dashboard-capacite-actions {
        flex-direction: row;
        justify-content: flex-end;
      }

      .dialog-dashboard-capacite-actions .button {
        width: auto;
        min-width: 150px;
      }
    }
  </style>
</head>

<body class="admin-page-verrouillee">
  <div class="site-page">

    <div id="bandeau-nav-container"></div>

    <main class="site-main">

      <section class="page-section page-section-large" aria-label="Menu admin parcs">
        <div class="page-container">
          <div class="page-content page-content-spaced">

            <h1 class="site-title">
              Menu Parc
            </h1>

            <div class="page-actions page-actions-grid page-actions-column" aria-label="Actions admin parcs">

              <a
                class="button button-orange"
                style="margin-top: 0;"
                href="/PAGES/PARC/DASHBOARD-PARC/dashboard-parc-1.html"
                data-admin-href="/PAGES/PARC/DASHBOARD-PARC/dashboard-parc-1.html"
              >
                Dashboard Parc
              </a>

              <a
                class="button"
                href="/PAGES/PARC/INSERT-PARC/insert-parc.html"
                data-admin-href="/PAGES/PARC/INSERT-PARC/insert-parc.html"
              >
                Insert parc
              </a>

              <a
                class="button"
                href="/PAGES/PARC/CAPACITE-PARC/ia-brief-parcs.html"
                data-admin-href="/PAGES/PARC/CAPACITE-PARC/ia-brief-parcs.html"
              >
                Capacité parc
              </a>

              <button
                class="button"
                type="button"
                id="bouton-dashboard-capacite"
              >
                Dashboard capacité
              </button>

            </div>

          </div>
        </div>
      </section>

    </main>

  </div>

  <dialog id="dialog-dashboard-capacite" class="dialog-dashboard-capacite" aria-labelledby="titre-dialog-dashboard-capacite">
    <div class="dialog-dashboard-capacite-contenu">
      <h2 id="titre-dialog-dashboard-capacite">
        Département à afficher
      </h2>

      <label for="champ-dashboard-capacite-dptmt">
        Numéro de département
      </label>

      <input
        id="champ-dashboard-capacite-dptmt"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        placeholder="Exemple : 41"
      >

      <p id="message-dashboard-capacite-dptmt" class="dialog-dashboard-capacite-message"></p>

      <div class="dialog-dashboard-capacite-actions">
        <button class="button button-secondary" type="button" id="bouton-annuler-dashboard-capacite">
          Annuler
        </button>

        <button class="button" type="button" id="bouton-valider-dashboard-capacite">
          OK
        </button>
      </div>
    </div>
  </dialog>

  <script>
    (() => {
      if (typeof window.corrigerCheminsAdmin === "function") {
        window.corrigerCheminsAdmin(document);
      }
    })();
  </script>

  <script>
    (() => {
      const container = document.getElementById("bandeau-nav-container");

      if (!container) return;

      fetch(window.construireUrlAdmin("/bandeau-nav-admin.html"), {
        method: "GET",
        cache: "no-store"
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error("Bandeau admin introuvable.");
          }

          return response.text();
        })
        .then((html) => {
          container.innerHTML = html;

          if (typeof window.corrigerCheminsAdmin === "function") {
            window.corrigerCheminsAdmin(container);
          }
        })
        .catch(() => {
          container.innerHTML = "";
        });
    })();
  </script>

  <script>
    (() => {
      const boutonDashboard = document.getElementById("bouton-dashboard-capacite");
      const dialogDashboard = document.getElementById("dialog-dashboard-capacite");
      const champDptmt = document.getElementById("champ-dashboard-capacite-dptmt");
      const messageDptmt = document.getElementById("message-dashboard-capacite-dptmt");
      const boutonAnnuler = document.getElementById("bouton-annuler-dashboard-capacite");
      const boutonValider = document.getElementById("bouton-valider-dashboard-capacite");

      function nettoyerDptmt(value) {
        return String(value || "").trim();
      }

      function ouvrirDialogDashboard() {
        if (!dialogDashboard || !champDptmt) return;

        messageDptmt.textContent = "";

        const dernierDptmt = nettoyerDptmt(
          window.localStorage.getItem("adminDashboardCapaciteDptmt")
        );

        champDptmt.value = dernierDptmt;

        if (typeof dialogDashboard.showModal === "function") {
          dialogDashboard.showModal();
        } else {
          dialogDashboard.setAttribute("open", "open");
        }

        window.setTimeout(() => {
          champDptmt.focus();
          champDptmt.select();
        }, 30);
      }

      function fermerDialogDashboard() {
        if (!dialogDashboard) return;

        if (typeof dialogDashboard.close === "function") {
          dialogDashboard.close();
        } else {
          dialogDashboard.removeAttribute("open");
        }
      }

      function validerDptmt() {
        const dptmt = nettoyerDptmt(champDptmt?.value);

        if (!dptmt) {
          messageDptmt.textContent = "Indique un département.";
          return;
        }

        window.localStorage.setItem("adminDashboardCapaciteDptmt", dptmt);

        const url = window.construireUrlAdmin(
          "/PAGES/PARC/DASHBOARD-CAPACITE/dashboard-capacite-1.html?dptmt=" +
          encodeURIComponent(dptmt)
        );

        window.location.href = url;
      }

      boutonDashboard?.addEventListener("click", ouvrirDialogDashboard);
      boutonAnnuler?.addEventListener("click", fermerDialogDashboard);
      boutonValider?.addEventListener("click", validerDptmt);

      champDptmt?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          validerDptmt();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          fermerDialogDashboard();
        }
      });
    })();
  </script>

  <script>
    (() => {
      const endpointLogSessAdmin = String(
        window.ADMIN_CONFIG?.API_LOG_SESS_AD || ""
      ).replace(/\/+$/, "");

      const urlConnexionAdmin = window.construireUrlAdmin("/connexion-admin.html");

      if (!endpointLogSessAdmin) {
        window.location.href = urlConnexionAdmin;
        return;
      }

      fetch(endpointLogSessAdmin + "/session", {
        method: "GET",
        credentials: "include",
        cache: "no-store",
        headers: {
          "Accept": "application/json"
        }
      })
        .then(async (response) => {
          const data = await response.json().catch(() => null);

          if (!response.ok || !data || data.success !== true) {
            window.location.href = urlConnexionAdmin;
            return;
          }

          document.body.classList.remove("admin-page-verrouillee");
        })
        .catch(() => {
          window.location.href = urlConnexionAdmin;
        });
    })();
  </script>
</body>
</html>
