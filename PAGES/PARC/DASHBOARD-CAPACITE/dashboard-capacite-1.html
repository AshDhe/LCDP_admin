<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Dashboard capacité - Espace Admin - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Afficher la capacité d'accueil des parcs par département, par mois et par plage horaire.">

  <script src="../../../config.js"></script>

  <script>
    (() => {
      const siteRootRelative = "../../../";
      const baseDepuisChemin = new URL(siteRootRelative, window.location.href);

      let siteBaseFallback = baseDepuisChemin.pathname.replace(/\/$/, "");

      if (siteBaseFallback === "/") {
        siteBaseFallback = "";
      }

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function joindreBaseEtChemin(baseUrl, chemin) {
        const base = nettoyerBaseUrl(baseUrl);
        const cheminNettoye = "/" + String(chemin || "").replace(/^\/+/, "");

        if (!base) {
          return cheminNettoye;
        }

        return base + cheminNettoye;
      }

      function cheminExterneOuAncre(chemin) {
        return (
          chemin.startsWith("#") ||
          chemin.startsWith("mailto:") ||
          chemin.startsWith("tel:") ||
          chemin.startsWith("http://") ||
          chemin.startsWith("https://")
        );
      }

      window.ADMIN_ROOT_RELATIVE = siteRootRelative;

      window.ADMIN_BASE = nettoyerBaseUrl(
        window.ADMIN_CONFIG?.ADMIN_BASE_URL ||
        siteBaseFallback ||
        ""
      );

      window.ASSETS_BASE = nettoyerBaseUrl("https://lacleduparc.fr");

      window.construireUrlAdmin = function construireUrlAdmin(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || cheminExterneOuAncre(valeur)) {
          return valeur;
        }

        return joindreBaseEtChemin(window.ADMIN_BASE, valeur);
      };

      window.construireUrlAsset = function construireUrlAsset(chemin) {
        return joindreBaseEtChemin(window.ASSETS_BASE, chemin);
      };

      window.corrigerCheminsAdmin = function corrigerCheminsAdmin(scope) {
        const racine = scope || document;

        racine.querySelectorAll("[data-admin-href]").forEach((element) => {
          element.setAttribute("href", window.construireUrlAdmin(element.dataset.adminHref));
        });

        racine.querySelectorAll("[data-public-src]").forEach((element) => {
          element.setAttribute("src", window.construireUrlAsset(element.dataset.publicSrc));
        });
      };

      document.write(
        '<link rel="stylesheet" href="' +
        window.construireUrlAsset("/OBJETS/CSS/base.css") +
        '">'
      );

      document.write(
        '<link rel="stylesheet" href="' +
        window.construireUrlAsset("/OBJETS/CSS/bandeau-et-burger.css") +
        '">'
      );
    })();
  </script>

  <link rel="stylesheet" href="./dashboard-capacite-1.css">

  <style>
    .admin-page-verrouillee .site-main {
      visibility: hidden;
    }
  </style>
</head>

<body class="admin-page-verrouillee">
  <div class="site-page">

    <div id="bandeau-nav-container"></div>

    <main class="site-main dashboard-capacite-page">

      <section class="dashboard-capacite-entete">
        <a
          class="dashboard-capacite-retour"
          href="/PAGES/PARC/index-parc.html"
          data-admin-href="/PAGES/PARC/index-parc.html"
        >
          ← Retour menu Parc
        </a>

        <h1>
          Dashboard capacité
        </h1>

        <p>
          Département <span id="valeur-departement-dashboard">-</span>
        </p>
      </section>

      <section class="dashboard-capacite-filtres" aria-label="Filtres du dashboard capacité">

        <div class="dashboard-capacite-champ">
          <label for="champ-departement-dashboard">
            Département
          </label>

          <div class="dashboard-capacite-champ-inline">
            <input
              id="champ-departement-dashboard"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              placeholder="41"
            >

            <button class="button" type="button" id="bouton-afficher-departement">
              Afficher
            </button>
          </div>
        </div>

        <div class="dashboard-capacite-champ">
          <label for="select-plage-dashboard">
            Plage affichée
          </label>

          <select id="select-plage-dashboard">
            <option value="plage1">Matin</option>
            <option value="plage2">Après-midi</option>
            <option value="plage3">Soir</option>
          </select>
        </div>

        <div class="dashboard-capacite-champ">
          <label for="select-parc-dashboard">
            Parc
          </label>

          <select id="select-parc-dashboard">
            <option value="">Tous les parcs du département</option>
          </select>
        </div>

      </section>

      <section class="dashboard-capacite-calendrier" aria-label="Calendrier de capacité">

        <div class="dashboard-capacite-navigation">

          <button class="micro-action" type="button" id="bouton-mois-precedent">
            ←
          </button>

          <h2 id="titre-mois-dashboard"></h2>

          <button class="micro-action" type="button" id="bouton-mois-suivant">
            →
          </button>

        </div>

        <p id="message-dashboard-capacite" class="dashboard-capacite-message"></p>

        <div class="dashboard-capacite-jours-semaine" aria-hidden="true">
          <span>Lun</span>
          <span>Mar</span>
          <span>Mer</span>
          <span>Jeu</span>
          <span>Ven</span>
          <span>Sam</span>
          <span>Dim</span>
        </div>

        <div class="dashboard-capacite-grille" id="grille-dashboard-capacite"></div>

      </section>

    </main>

  </div>

  <script>
    (() => {
      if (typeof window.corrigerCheminsAdmin === "function") {
        window.corrigerCheminsAdmin(document);
      }
    })();
  </script>

  <script>
    (() => {
      const container = document.getElementById("bandeau-nav-container");

      if (!container) return;

      fetch(window.construireUrlAdmin("/bandeau-nav-admin.html"), {
        method: "GET",
        cache: "no-store"
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error("Bandeau admin introuvable.");
          }

          return response.text();
        })
        .then((html) => {
          container.innerHTML = html;

          if (typeof window.corrigerCheminsAdmin === "function") {
            window.corrigerCheminsAdmin(container);
          }
        })
        .catch(() => {
          container.innerHTML = "";
        });
    })();
  </script>

  <script>
    (() => {
      const endpointLogSessAdmin = String(
        window.ADMIN_CONFIG?.API_LOG_SESS_AD || ""
      ).replace(/\/+$/, "");

      const urlConnexionAdmin = window.construireUrlAdmin("/connexion-admin.html");

      if (!endpointLogSessAdmin) {
        window.location.href = urlConnexionAdmin;
        return;
      }

      fetch(endpointLogSessAdmin + "/session", {
        method: "GET",
        credentials: "include",
        cache: "no-store",
        headers: {
          "Accept": "application/json"
        }
      })
        .then(async (response) => {
          const data = await response.json().catch(() => null);

          if (!response.ok || !data || data.success !== true) {
            window.location.href = urlConnexionAdmin;
            return;
          }

          document.body.classList.remove("admin-page-verrouillee");
          window.dispatchEvent(new Event("admin-session-validee"));
        })
        .catch(() => {
          window.location.href = urlConnexionAdmin;
        });
    })();
  </script>

  <script src="./dashboard-capacite-1.js"></script>
</body>
</html>
