<section
  class="lcdp-table-lecture-admin"
  aria-label="Table de lecture admin"
  data-lcdp-table-lecture-admin
>
  <div
    class="lcdp-table-lecture-admin__scroll"
    data-lcdp-table-lecture-admin-scroll
    hidden
  >
    <table class="lcdp-table-lecture-admin__table">
      <thead>
        <tr data-lcdp-table-lecture-admin-head></tr>
        <tr
          class="lcdp-table-lecture-admin__sorts"
          data-lcdp-table-lecture-admin-sorts
        ></tr>
        <tr
          class="lcdp-table-lecture-admin__filters"
          data-lcdp-table-lecture-admin-filters
        ></tr>
      </thead>

      <tbody data-lcdp-table-lecture-admin-body></tbody>
    </table>
  </div>

  <p
    class="lcdp-table-lecture-admin__status"
    data-lcdp-table-lecture-admin-empty
    hidden
  >
    Aucun résultat.
  </p>

  <p
    class="lcdp-table-lecture-admin__status lcdp-table-lecture-admin__status--error"
    data-lcdp-table-lecture-admin-error
    role="alert"
    hidden
  ></p>
</section>
