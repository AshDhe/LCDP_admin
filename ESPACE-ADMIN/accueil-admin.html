<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Accueil admin - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Accueil de l’espace admin La Clé du Parc.">

  <script src="../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" +
          String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        if (typeof config.adminUrl === "function") {
          return config.adminUrl(path);
        }

        return construireUrl(adminBase, path);
      };

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return construireUrl(publicBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return construireUrl(objetBase, path);
      };

      [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-alerte.css",
        "/BOX/04-box-dialogue-champ.css"
      ].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(path) +
          '">'
        );
      });

      ["/ESPACE-ADMIN/A_STRUCTURE/css-admin.css"].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlAdmin(path) +
          '">'
        );
      });

      ["/OBJET/BOX/04-box-dialogue-upload-img.css"].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlPublic(path) +
          '">'
        );
      });

    })();
  </script>

  <script src="./A_STRUCTURE/guard-admin.js"></script>
  <script src="./A_STRUCTURE/menu-gauche-admin.js"></script>
</head>
<body class="lcdp-page-accueil-admin">
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>
    <div id="lcdp-lightbox-slot"></div>

    <main class="lcdp-site-main" id="lcdp-main-admin" hidden>
      <section class="lcdp-page-section" aria-label="Accueil espace admin">
        <div class="lcdp-page-container">
          <div class="lcdp-admin-accueil-layout">

            <div id="lcdp-menu-gauche-admin-slot"></div>
            <div id="lcdp-menu-centre-admin-slot"></div>

          </div>
        </div>
      </section>
    </main>

  </div>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};
      const NOMBRE_BOUTONS_PAR_MENU = 30;
      const SLOT_CARTE_PARC = 3;
      const SLOT_CARD_PARC = 4;
      const SLOT_LOCALISATION_PARC = 18;
      const SLOT_QUALIFICATION_PARC = 19;
      const SLOT_CARD1_PARC = 20;
      const SLOT_UPLOAD_IMG_PARC = 21;
      const SLOT_HORIZON_PLANNING = 25;
      const SLOT_PLANNING_PARC = 26;
      const SLOT_INSERT_FAMILLE = 27;
      const SLOT_AJUST_FAMILLE = 28;
      const SLOT_ADJUST_COACH = 29;
      const SLOT_ADJUST_DUO = 30;
      const CHEMIN_BOX_UPLOAD_IMG =
        "/OBJET/BOX/04-box-dialogue-upload-img.html";

      const moduleMenu = window.LCDP_MENU_GAUCHE_ADMIN;

      const categoriesAdmin =
        moduleMenu &&
        typeof moduleMenu.getCategories === "function"
          ? moduleMenu.getCategories()
          : [
              {
                id: "admin",
                label: "Admin",
                cat: "Admin",
                fallback: "Admin"
              },
              {
                id: "parcs",
                label: "Parcs",
                cat: "Parcs",
                fallback: "Parc"
              },
              {
                id: "membres",
                label: "Membres",
                cat: "Membres",
                fallback: "Membres"
              }
            ];

      let boutonsConfigures = [];
      let localisationEnCours = false;
      let qualificationEnCours = false;
      let card1EnCours = false;
      let uploadIMGEnCours = false;

      function urlAdmin(path) {
        return typeof window.LCDP_urlAdmin === "function"
          ? window.LCDP_urlAdmin(path)
          : path;
      }

      function urlPublic(path) {
        return typeof window.LCDP_urlPublic === "function"
          ? window.LCDP_urlPublic(path)
          : path;
      }

      function urlObjet(path) {
        return typeof window.LCDP_urlObjet === "function"
          ? window.LCDP_urlObjet(path)
          : path;
      }

      function appliquerRoutes(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const path = element.dataset.siteHref || "";
          const space = element.dataset.space || "public";

          element.setAttribute(
            "href",
            space === "admin" ? urlAdmin(path) : urlPublic(path)
          );
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const path = String(element.dataset.siteSrc || "")
            .replace(/^\/?OBJET\/?/, "/");

          element.setAttribute("src", urlObjet(path));
        });
      }

      async function chargerFragment(url, libelle) {
        const response = await fetch(url, {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!response.ok) {
          throw new Error(libelle + " introuvable.");
        }

        const template = document.createElement("template");
        template.innerHTML = (await response.text()).trim();

        return template.content.cloneNode(true);
      }

      function chargerFragmentAdmin(path) {
        return chargerFragment(
          urlAdmin(path),
          "Fragment ADMIN " + path
        );
      }

      function chargerFragmentObjet(path) {
        return chargerFragment(
          urlObjet(path),
          "Fragment OBJET " + path
        );
      }

      function chargerScriptAdminUneFois(path) {
        const src = urlAdmin(path);

        if (
          document.querySelector(
            `script[data-lcdp-script-admin="${path}"]`
          )
        ) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScriptAdmin = path;
          script.onload = resolve;
          script.onerror = () => reject(
            new Error("Script ADMIN introuvable : " + path)
          );
          document.body.appendChild(script);
        });
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/box-bandeau-nav-admin.html"
        );

        slot.appendChild(fragment);
        appliquerRoutes(slot);
      }

      function endpointAdminData() {
        return String(
          config.workerAdminDataUrl ||
          config.WORKER_ADMIN_DATA_URL ||
          window.ADMIN_CONFIG?.API_ADMIN_DATA ||
          ""
        ).replace(/\/+$/, "");
      }

      function endpointParcAdmin() {
        return String(
          config.workerParcAdminUrl ||
          config.WORKER_PARC_ADMIN_URL ||
          window.ADMIN_CONFIG?.API_PARC_ADMIN ||
          window.ADMIN_CONFIG?.API_PARC_ADMIN_URL ||
          ""
        ).replace(/\/+$/, "");
      }

      function endpointParcPlanning() {
        return String(
          config.workerParcPlanningUrl ||
          config.WORKER_PARC_PLANNING_URL ||
          window.ADMIN_CONFIG?.API_PARC_PLANNING ||
          ""
        ).replace(/\/+$/, "");
      }

      async function chargerBoutonsAdmin() {
        const endpoint = endpointAdminData();

        if (!endpoint) {
          throw new Error("Endpoint admin data non configuré.");
        }

        const response = await fetch(endpoint + "/menu", {
          method: "GET",
          credentials: "include",
          cache: "no-store",
          headers: {
            Accept: "application/json"
          }
        });

        const data = await response.json().catch(() => null);

        if (!response.ok || !data || data.success !== true) {
          throw new Error(
            data?.message ||
            data?.detail ||
            "Impossible de charger le menu admin."
          );
        }

        return Array.isArray(data.buttons) ? data.buttons : [];
      }

      function estSlotCarteParc(categorie, position) {
        return categorie.id === "parcs" && Number(position) === SLOT_CARTE_PARC;
      }

      function configurerBoutonCarteParc(lien) {
        lien.textContent = "CarteParc";
        lien.href = urlAdmin("/ESPACE-ADMIN/B_PARCS/CarteParc.html");
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.carte";
        lien.setAttribute("aria-label", "Ouvrir CarteParc");
      }

      function estSlotCardParc(categorie, position) {
        return categorie.id === "parcs" && Number(position) === SLOT_CARD_PARC;
      }

      function configurerBoutonCardParc(lien) {
        lien.textContent = "CardParc";
        lien.href = "#cardparc";
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.cardparc";
        lien.setAttribute(
          "aria-label",
          "Afficher les Card Parc d’un département"
        );

        lien.addEventListener("click", (event) => {
          event.preventDefault();

          ouvrirCardParcDepuisAccueil().catch(async (error) => {
            const alerte = await ouvrirAlerteLocalisation(
              "CardParc indisponible : " +
              String(error?.message || error || "")
            );

            if (alerte) {
              alerte.afficherOk();
            }
          });
        });
      }

      function estSlotLocalisationParc(categorie, position) {
        return categorie.id === "parcs" && Number(position) === SLOT_LOCALISATION_PARC;
      }

      function configurerBoutonLocalisation(lien) {
        lien.textContent = "Localisation";
        lien.href = "#";
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.localisation";
        lien.setAttribute("aria-label", "Mettre à jour la localisation des parcs");

        lien.addEventListener("click", (event) => {
          event.preventDefault();
          demanderEtLancerLocalisationParcs();
        });
      }

      function estSlotQualificationParc(categorie, position) {
        return categorie.id === "parcs" && Number(position) === SLOT_QUALIFICATION_PARC;
      }

      function configurerBoutonQualification(lien) {

        lien.href = "#qualification";
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.qualification";
        lien.setAttribute("aria-label", "Préqualifier les parcs en recherche");

        lien.addEventListener("click", (event) => {
          event.preventDefault();
          demanderEtLancerQualificationParcs();
        });
      }

      function estSlotCard1Parc(categorie, position) {
        return categorie.id === "parcs" && Number(position) === SLOT_CARD1_PARC;
      }

      function configurerBoutonCard1(lien) {
        lien.textContent = "Card1";
        lien.href = "#card1";
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.card1";
        lien.setAttribute("aria-label", "Récolter un brouillon Card1 pour les parcs prépa sans card1.webp");

        lien.addEventListener("click", (event) => {
          event.preventDefault();
          demanderEtLancerCard1Parcs();
        });
      }

      function estSlotUploadIMGParc(categorie, position) {
        return categorie.id === "parcs" && Number(position) === SLOT_UPLOAD_IMG_PARC;
      }

      function configurerBoutonUploadIMG(lien) {

        lien.href = "#uploadimg";
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.uploadimg";
        lien.setAttribute(
          "aria-label",
          "Uploader de une à six images dans le répertoire GitHub d’un parc"
        );

        lien.addEventListener("click", (event) => {
          event.preventDefault();
          demanderEtLancerUploadIMGParc();
        });
      }

      function estSlotHorizonPlanning(categorie, position) {
        return (
          categorie.id === "parcs" &&
          Number(position) === SLOT_HORIZON_PLANNING
        );
      }

      function configurerBoutonHorizonPlanning(lien) {
        lien.textContent = "HorizonPlanning";
        lien.href = urlAdmin(
          "/ESPACE-ADMIN/B_PARCS/Horizon-Planning.html"
        );
        lien.classList.remove(
          "lcdp-button-primary",
          "lcdp-button-secondary"
        );
        lien.classList.add("lcdp-button-orange");
        lien.removeAttribute("aria-disabled");
        lien.setAttribute(
          "aria-label",
          "Ouvrir HorizonPlanning"
        );
      }

      function estSlotPlanningParc(categorie, position) {
        return (
          categorie.id === "parcs" &&
          Number(position) === SLOT_PLANNING_PARC
        );
      }

      function configurerBoutonPlanningParc(lien) {
        lien.textContent = "PlanningParc";
        lien.href = "#planningparc";
        lien.classList.remove(
          "lcdp-button-primary",
          "lcdp-button-secondary"
        );
        lien.classList.add("lcdp-button-orange");
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.planning";
        lien.setAttribute(
          "aria-label",
          "Afficher le planning d’un parc"
        );

        lien.addEventListener("click", (event) => {
          event.preventDefault();

          ouvrirPlanningParcDepuisAccueil().catch(async (error) => {
            const alerte = await ouvrirAlerteLocalisation(
              "PlanningParc indisponible : " +
              String(error?.message || error || "")
            );

            if (alerte) {
              alerte.afficherOk();
            }
          });
        });
      }

      function estSlotInsertFamille(categorie, position) {
        return (
          categorie.id === "parcs" &&
          Number(position) === SLOT_INSERT_FAMILLE
        );
      }

      function configurerBoutonInsertFamille(lien) {
        lien.textContent = "InsertFamille";
        lien.href = "#insertfamille";
        lien.classList.remove(
          "lcdp-button-primary",
          "lcdp-button-secondary"
        );
        lien.classList.add("lcdp-button-orange");
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.planning";
        lien.setAttribute(
          "aria-label",
          "Insérer le planning FAMILLE d’un parc"
        );

        lien.addEventListener("click", (event) => {
          event.preventDefault();

          ouvrirInsertFamilleDepuisAccueil().catch(async (error) => {
            const alerte = await ouvrirAlerteLocalisation(
              "InsertFamille indisponible : " +
              String(error?.message || error || "")
            );

            if (alerte) {
              alerte.afficherOk();
            }
          });
        });
      }

      function estSlotAjustFamille(categorie, position) {
        return (
          categorie.id === "parcs" &&
          Number(position) === SLOT_AJUST_FAMILLE
        );
      }

      function configurerBoutonAjustFamille(lien) {
        lien.textContent = "AjustFamille";
        lien.href = "#ajustfamille";
        lien.classList.remove(
          "lcdp-button-primary",
          "lcdp-button-secondary"
        );
        lien.classList.add("lcdp-button-orange");
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.planning";
        lien.setAttribute(
          "aria-label",
          "Ajuster le planning FAMILLE d’un parc"
        );

        lien.addEventListener("click", (event) => {
          event.preventDefault();

          ouvrirAjustFamilleDepuisAccueil().catch(async (error) => {
            const alerte = await ouvrirAlerteLocalisation(
              "AjustFamille indisponible : " +
              String(error?.message || error || "")
            );

            if (alerte) {
              alerte.afficherOk();
            }
          });
        });
      }

      function estSlotAdjustCoach(categorie, position) {
        return (
          categorie.id === "parcs" &&
          Number(position) === SLOT_ADJUST_COACH
        );
      }

      function configurerBoutonAdjustCoach(lien) {
        lien.textContent = "AdjustCoach";
        lien.href = "#adjustcoach";
        lien.classList.remove(
          "lcdp-button-primary",
          "lcdp-button-secondary"
        );
        lien.classList.add("lcdp-button-orange");
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.planning";
        lien.setAttribute(
          "aria-label",
          "Ajuster le planning COACH d’un parc"
        );

        lien.addEventListener("click", (event) => {
          event.preventDefault();

          ouvrirAdjustCoachDepuisAccueil().catch(async (error) => {
            const alerte = await ouvrirAlerteLocalisation(
              "AdjustCoach indisponible : " +
              String(error?.message || error || "")
            );

            if (alerte) {
              alerte.afficherOk();
            }
          });
        });
      }

      function estSlotAdjustDuo(categorie, position) {
        return (
          categorie.id === "parcs" &&
          Number(position) === SLOT_ADJUST_DUO
        );
      }

      function configurerBoutonAdjustDuo(lien) {
        lien.textContent = "AdjustDuo";
        lien.href = "#adjustduo";
        lien.classList.remove(
          "lcdp-button-primary",
          "lcdp-button-secondary"
        );
        lien.classList.add("lcdp-button-orange");
        lien.removeAttribute("aria-disabled");
        lien.dataset.permissionCode = "parcs.planning";
        lien.setAttribute(
          "aria-label",
          "Ajuster le planning DUO d’un parc"
        );

        lien.addEventListener("click", (event) => {
          event.preventDefault();

          ouvrirAdjustDuoDepuisAccueil().catch(async (error) => {
            const alerte = await ouvrirAlerteLocalisation(
              "AdjustDuo indisponible : " +
              String(error?.message || error || "")
            );

            if (alerte) {
              alerte.afficherOk();
            }
          });
        });
      }

      function estSlotOrangeAdminOuMembres(categorie, position) {
        return (
          (
            categorie.id === "admin" ||
            categorie.id === "membres"
          ) &&
          (
            Number(position) === 25 ||
            Number(position) === 26
          )
        );
      }

      function afficherCategorie(categorieId) {
        const categorie = categoriesAdmin.find(
          (item) => item.id === categorieId
        );

        if (!categorie) {
          return;
        }

        document
          .querySelectorAll("[data-lcdp-menu-gauche-admin-category]")
          .forEach((button) => {
            const active =
              button.dataset.lcdpMenuGaucheAdminCategory === categorie.id;

            button.setAttribute("aria-pressed", String(active));
          });

        const grid = document.querySelector(
          "[data-lcdp-mini-galerie-menu-centre-admin-grid]"
        );

        const template = document.querySelector(
          "[data-lcdp-mini-galerie-menu-centre-admin-template]"
        );

        if (!grid || !template) {
          throw new Error("Structure de la mini galerie admin incomplète.");
        }

        grid.innerHTML = "";

        for (
          let position = 1;
          position <= NOMBRE_BOUTONS_PAR_MENU;
          position += 1
        ) {
          const lien = template.content.firstElementChild.cloneNode(true);

          const configuration = boutonsConfigures.find((bouton) => {
            return (
              bouton.cat === categorie.cat &&
              Number(bouton.position) === position
            );
          });

          if (estSlotCarteParc(categorie, position)) {
            configurerBoutonCarteParc(lien);
          } else if (estSlotCardParc(categorie, position)) {
            configurerBoutonCardParc(lien);
          } else if (estSlotLocalisationParc(categorie, position)) {
            configurerBoutonLocalisation(lien);
          } else if (estSlotQualificationParc(categorie, position)) {
            configurerBoutonQualification(lien);
          } else if (estSlotCard1Parc(categorie, position)) {
            configurerBoutonCard1(lien);
          } else if (estSlotUploadIMGParc(categorie, position)) {
            configurerBoutonUploadIMG(lien);
          } else if (estSlotHorizonPlanning(categorie, position)) {
            configurerBoutonHorizonPlanning(lien);
          } else if (estSlotPlanningParc(categorie, position)) {
            configurerBoutonPlanningParc(lien);
          } else if (estSlotInsertFamille(categorie, position)) {
            configurerBoutonInsertFamille(lien);
          } else if (estSlotAjustFamille(categorie, position)) {
            configurerBoutonAjustFamille(lien);
          } else if (estSlotAdjustCoach(categorie, position)) {
            configurerBoutonAdjustCoach(lien);
          } else if (estSlotAdjustDuo(categorie, position)) {
            configurerBoutonAdjustDuo(lien);
          } else if (configuration) {
            lien.textContent = configuration.label;
            lien.href = urlAdmin(configuration.href);
            lien.dataset.permissionCode =
              configuration.permission_code || "";
            lien.setAttribute(
              "aria-label",
              "Ouvrir " + configuration.label
            );
          } else {
            lien.textContent = categorie.fallback + " " + position;
            lien.href = "#";
            lien.setAttribute("aria-disabled", "true");

            lien.addEventListener("click", (event) => {
              event.preventDefault();
            });
          }

          if (estSlotOrangeAdminOuMembres(categorie, position)) {
            lien.classList.remove(
              "lcdp-button-primary",
              "lcdp-button-secondary"
            );
            lien.classList.add("lcdp-button-orange");
          }

          grid.appendChild(lien);
        }

        const url = new URL(window.location.href);
        url.searchParams.set("categorie", categorie.id);
        window.history.replaceState(null, "", url);
      }

      async function ouvrirAlerteLocalisation(message, options = {}) {
        const slot = document.getElementById("lcdp-lightbox-slot");

        if (!slot) {
          window.alert(message || "");
          return null;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentObjet("/BOX/02-box-alerte.html");
        slot.appendChild(fragment);

        const alerte = slot.querySelector("[data-lcdp-box-alerte]");
        const texte = slot.querySelector("[data-lcdp-alerte-message]");
        const boutonFermer = slot.querySelector("[data-lcdp-alerte-close]");
        const boutonOk = slot.querySelector("[data-lcdp-alerte-ok]");
        const verrouilleeAuDepart = options.okVisible === false;

        if (!alerte || !texte || !boutonOk) {
          slot.innerHTML = "";
          window.alert(message || "");
          return null;
        }

        let fermetureAutorisee = !verrouilleeAuDepart;

        texte.textContent = message || "";

        function masquerElement(element) {
          if (!element) {
            return;
          }

          element.hidden = true;
          element.disabled = true;
          element.setAttribute("aria-hidden", "true");
          element.setAttribute("aria-disabled", "true");
          element.tabIndex = -1;
          element.style.display = "none";
          element.style.pointerEvents = "none";
        }

        function afficherBoutonOk() {
          boutonOk.hidden = false;
          boutonOk.disabled = false;
          boutonOk.removeAttribute("aria-hidden");
          boutonOk.setAttribute("aria-disabled", "false");
          boutonOk.removeAttribute("tabindex");
          boutonOk.style.display = "";
          boutonOk.style.pointerEvents = "";
        }

        /*
         * Workflow orange en cours :
         * - aucune croix visible ;
         * - aucun OK visible ou cliquable ;
         * - aucune fermeture possible tant que le worker n'a pas répondu.
         */
        masquerElement(boutonFermer);

        if (verrouilleeAuDepart) {
          masquerElement(boutonOk);
        } else {
          afficherBoutonOk();
        }

        function fermer(force = false) {
          if (!force && !fermetureAutorisee) {
            return;
          }

          slot.innerHTML = "";
        }

        if (boutonFermer) {
          boutonFermer.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();

            if (fermetureAutorisee) {
              fermer();
            }
          });
        }

        boutonOk.addEventListener("click", (event) => {
          if (!fermetureAutorisee || boutonOk.disabled) {
            event.preventDefault();
            event.stopPropagation();
            return;
          }

          fermer();
        });

        return {
          setMessage(nouveauMessage) {
            texte.textContent = nouveauMessage || "";
          },
          afficherOk() {
            fermetureAutorisee = true;
            afficherBoutonOk();
            boutonOk.focus();
          },
          fermer() {
            fermer(true);
          }
        };
      }

      function normaliserDepartementLocalisation(value) {
        const brut = String(value || "")
          .trim()
          .toUpperCase()
          .replace(/\s+/g, "");

        if (/^\d{1,2}$/.test(brut)) {
          return brut.padStart(2, "0");
        }

        if (/^\d{3}$/.test(brut)) {
          return brut;
        }

        if (brut === "2A" || brut === "2B") {
          return brut;
        }

        return "";
      }

      function normaliserLimiteLocalisationFront(value) {
        const brut = String(value || "").trim();

        if (!/^\d+$/.test(brut)) {
          return null;
        }

        const nombre = Number.parseInt(brut, 10);

        if (
          !Number.isFinite(nombre) ||
          nombre < 1 ||
          nombre > 50
        ) {
          return null;
        }

        return nombre;
      }

      async function chargerDepartementsUploadIMG(select) {
        const endpoint = endpointParcAdmin();

        if (!endpoint) {
          throw new Error("Endpoint du worker admin parc non configuré.");
        }

        select.disabled = true;
        select.innerHTML = "";
        ajouterOptionUploadIMG(select, "", "Chargement…");

        const response = await fetch(
          endpoint + "/uploadimg/departements",
          {
            method: "GET",
            credentials: "include",
            cache: "no-store",
            headers: {
              Accept: "application/json"
            }
          }
        );

        const data = await response.json().catch(() => null);

        if (!response.ok || !data || data.success !== true) {
          throw new Error(
            data?.message ||
            data?.detail ||
            "Impossible de charger les départements."
          );
        }

        select.innerHTML = "";
        ajouterOptionUploadIMG(select, "", "Choisir un département");

        for (const dptmt of data.departements || []) {
          ajouterOptionUploadIMG(
            select,
            String(dptmt),
            String(dptmt)
          );
        }

        select.disabled = false;
      }

      function actualiserListeImagesUploadIMG(input, liste) {
        const fichiers = Array.from(input.files || []);
        liste.innerHTML = "";

        for (const fichier of fichiers) {
          const item = document.createElement("li");
          item.textContent = fichier.name;
          liste.appendChild(item);
        }

        liste.hidden = fichiers.length === 0;
      }

      function validerImagesUploadIMG(input) {
        const fichiers = Array.from(input.files || []);

        if (fichiers.length < 1 || fichiers.length > 6) {
          return {
            success: false,
            message: "Sélectionner entre 1 et 6 images."
          };
        }

        let total = 0;

        for (const fichier of fichiers) {
          const taille = Number(fichier.size || 0);

          if (!taille) {
            return {
              success: false,
              message: "Image vide : " + fichier.name + "."
            };
          }

          if (taille > 15 * 1024 * 1024) {
            return {
              success: false,
              message:
                "Image trop lourde : " +
                fichier.name +
                ". Maximum : 15 Mo."
            };
          }

          total += taille;
        }

        if (total > 60 * 1024 * 1024) {
          return {
            success: false,
            message: "Le poids total des images dépasse 60 Mo."
          };
        }

        return {
          success: true,
          fichiers
        };
      }

      async function lancerUploadIMGParc(options) {
        if (uploadIMGEnCours) {
          return;
        }

        const endpoint = endpointParcAdmin();

        if (!endpoint) {
          const alerteConfig = await ouvrirAlerteLocalisation(
            "Endpoint du worker admin parc non configuré."
          );

          if (alerteConfig) {
            alerteConfig.afficherOk();
          }

          return;
        }

        uploadIMGEnCours = true;

        const alerte = await ouvrirAlerteLocalisation(
          "UploadIMG en cours pour " +
          options.nomParc +
          ". Ne fermez pas cette page.",
          {
            okVisible: false
          }
        );

        try {
          const formData = new FormData();
          formData.append("dptmt", options.dptmt);
          formData.append("idparc", options.idparc);

          for (const fichier of options.fichiers) {
            formData.append(
              "images",
              fichier,
              fichier.name
            );
          }

          const response = await fetch(
            endpoint + "/uploadimg",
            {
              method: "POST",
              credentials: "include",
              cache: "no-store",
              headers: {
                Accept: "application/json"
              },
              body: formData
            }
          );

          const data = await response.json().catch(() => null);

          if (!data) {
            throw new Error("Réponse UploadIMG inexploitable.");
          }

          if (!response.ok) {
            throw new Error(
              data?.message ||
              data?.detail ||
              "UploadIMG impossible."
            );
          }

          const parc = data.parc || {};
          const erreursDetaillees = Array.isArray(data.details)
            ? data.details
                .filter((detail) => detail?.success === false)
                .map((detail) => {
                  const nom = String(detail?.nom || "Image");
                  const detailMessage = String(
                    detail?.message || "Erreur non détaillée."
                  );

                  return nom + " : " + detailMessage;
                })
                .join("\n")
            : "";

          const message =
            (data.message || "UploadIMG terminé.") +
            "\nParc : " +
            (parc.nom || options.nomParc) +
            "\nDépartement : " +
            (parc.dptmt || options.dptmt) +
            "\nImages uploadées : " +
            String(data.uploades || 0) +
            "\nImages précédentes versionnées : " +
            String(data.versionnes || 0) +
            "\nErreurs : " +
            String(data.erreurs || 0) +
            (erreursDetaillees
              ? "\nDétail :\n" + erreursDetaillees
              : "");

          if (alerte) {
            alerte.setMessage(message);
            alerte.afficherOk();
          }
        } catch (error) {
          if (alerte) {
            alerte.setMessage(
              "UploadIMG interrompu : " +
              String(error?.message || error || "")
            );
            alerte.afficherOk();
          }
        } finally {
          uploadIMGEnCours = false;
        }
      }

        }

        const options = await ouvrirDialogueParametresLocalisation();

        if (!options) {
          return;
        }

        await lancerLocalisationParcs(options);
      }

      async function lancerLocalisationParcs(options) {
        if (localisationEnCours) {
          return;
        }

        const endpoint = endpointParcAdmin();

        if (!endpoint) {
          const alerteConfig = await ouvrirAlerteLocalisation(
            "Endpoint du worker admin parc non configuré."
          );

          if (alerteConfig) {
            alerteConfig.afficherOk();
          }

          return;
        }

        localisationEnCours = true;

        const alerte = await ouvrirAlerteLocalisation(
          "Mise à jour en cours pour le département " +
          options.dptmt +
          " (maximum " +
          options.limit +
          " parcs). Ne fermez pas cette page.",
          {
            okVisible: false
          }
        );

        try {
          const response = await fetch(endpoint + "/localisation", {
            method: "POST",
            credentials: "include",
            cache: "no-store",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              dptmt: options.dptmt,
              limit: options.limit
            })
          });

          const data = await response.json().catch(() => null);

          if (!data) {
            throw new Error(
              "Réponse localisation inexploitable."
            );
          }

          if (!response.ok) {
            throw new Error(
              data?.message ||
              data?.detail ||
              "Mise à jour impossible."
            );
          }

          const message =
            (data.message || "Mise à jour terminée.") +
            "\nDépartement : " +
            (data.dptmt || options.dptmt) +
            "\nLimite : " +
            String(data.limite || options.limit) +
            "\nParcs traités : " +
            String(data.traites || 0) +
            "\nParcs modifiés : " +
            String(data.modifies || 0) +
            "\nErreurs : " +
            String(data.erreurs || 0);

          if (alerte) {
            alerte.setMessage(message);
            alerte.afficherOk();
          }

        } catch (error) {
          if (alerte) {
            alerte.setMessage(
              "Mise à jour interrompue : " +
              String(error?.message || error || "")
            );
            alerte.afficherOk();
          }
        } finally {
          localisationEnCours = false;
        }
      }

      function categorieInitiale() {
        const demandee = new URLSearchParams(
          window.location.search
        ).get("categorie");

        return categoriesAdmin.some(
          (categorie) => categorie.id === demandee
        )
          ? demandee
          : "admin";
      }

      async function initialiserMenusAdmin() {
        const leftSlot = document.getElementById(
          "lcdp-menu-gauche-admin-slot"
        );

        const centerSlot = document.getElementById(
          "lcdp-menu-centre-admin-slot"
        );

        if (!leftSlot || !centerSlot) {
          return;
        }

        leftSlot.innerHTML = "";
        centerSlot.innerHTML = "";

        const [leftMenu, centerMenu] = await Promise.all([
          chargerFragmentAdmin(
            "/ESPACE-ADMIN/A_STRUCTURE/menu-gauche-admin.html"
          ),
          chargerFragmentAdmin(
            "/ESPACE-ADMIN/A_STRUCTURE/menu-centre-admin.html"
          )
        ]);

        leftSlot.appendChild(leftMenu);
        centerSlot.appendChild(centerMenu);

        const buttonSlot = leftSlot.querySelector(
          "[data-lcdp-menu-gauche-admin-slot]"
        );

        const gallerySlot = centerSlot.querySelector(
          "[data-lcdp-menu-centre-admin-contenu]"
        );

        if (!buttonSlot || !gallerySlot) {
          throw new Error("Structure des menus admin incomplète.");
        }

        const [genericButtonMenu, miniGallery] = await Promise.all([
          chargerFragmentObjet("/BOX/02-box-menu-bouton.html"),
          chargerFragmentAdmin(
            "/ESPACE-ADMIN/A_STRUCTURE/mini-galerie-menu-centre-admin.html"
          )
        ]);

        buttonSlot.appendChild(genericButtonMenu);
        gallerySlot.appendChild(miniGallery);

        const nav = buttonSlot.querySelector(
          "[data-lcdp-box-menu-bouton]"
        );

        const list = buttonSlot.querySelector(
          "[data-lcdp-menu-bouton-list]"
        );

        if (!nav || !list) {
          throw new Error("Objet 02-box-menu-bouton incomplet.");
        }

        nav.setAttribute("aria-label", "Catégories de l’espace admin");

        categoriesAdmin.forEach((categorie) => {
          const button = document.createElement("button");

          button.type = "button";
          button.className = "lcdp-button lcdp-button-primary";
          button.textContent = categorie.label;
          button.dataset.lcdpMenuGaucheAdminCategory = categorie.id;
          button.setAttribute("aria-pressed", "false");

          button.addEventListener("click", () => {
            afficherCategorie(categorie.id);
          });

          list.appendChild(button);
        });

        afficherCategorie(categorieInitiale());
      }

      async function verifierSessionAdmin() {
        const guard = window.LCDP_GUARD_ADMIN;

        if (
          !guard ||
          typeof guard.verifierAccesPageAdmin !== "function"
        ) {
          throw new Error("Garde admin centralisé indisponible.");
        }

        return guard.verifierAccesPageAdmin();
      }

      async function initialiserPage() {
        const sessionValide = await verifierSessionAdmin();

        if (!sessionValide) {
          return;
        }

        boutonsConfigures = await chargerBoutonsAdmin();

        await Promise.all([
          initialiserBandeau(),
          initialiserMenusAdmin()
        ]);

        const main = document.getElementById("lcdp-main-admin");

        if (main) {
          main.hidden = false;
        }
      }

      initialiserPage().catch((error) => {
        console.error(error);
      });
    })();
  </script>
