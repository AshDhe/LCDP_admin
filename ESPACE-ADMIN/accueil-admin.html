<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Accueil admin - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Accueil de l’espace admin La Clé du Parc.">

  <script src="../config.js"></script>
  <script src="./A_STRUCTURE/guard-admin.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" + String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        if (typeof config.adminUrl === "function") {
          return config.adminUrl(path);
        }

        return construireUrl(adminBase, path);
      };

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return construireUrl(publicBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return construireUrl(objetBase, path);
      };

      [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-footer.css"
      ].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(path) +
          '">'
        );
      });

      [
        "/ESPACE-ADMIN/A_STRUCTURE/menu-gauche-admin.css",
        "/ESPACE-ADMIN/A_STRUCTURE/menu-centre-admin.css",
        "/ESPACE-ADMIN/A_STRUCTURE/mini-galerie-menu-centre-admin.css"
      ].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlAdmin(path) +
          '">'
        );
      });
    })();
  </script>
</head>

<body class="lcdp-page-accueil-admin">
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main" id="lcdp-main-admin" hidden>
      <section class="lcdp-page-section" aria-label="Accueil espace admin">
        <div class="lcdp-page-container">
          <div class="lcdp-admin-accueil-layout">

            <div id="lcdp-menu-gauche-admin-slot"></div>
            <div id="lcdp-menu-centre-admin-slot"></div>

          </div>
        </div>
      </section>
    </main>

    <div id="lcdp-footer-slot"></div>

  </div>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      const categoriesAdmin = [
        {
          id: "admin",
          bouton: "Admin",
          titre: "Menu admin",
          rubriques: []
        },
        {
          id: "parcs",
          bouton: "Parcs",
          titre: "Menu parcs",
          rubriques: []
        },
        {
          id: "membres",
          bouton: "Membres",
          titre: "Menu membres",
          rubriques: []
        }
      ];

      function estUrlExterneOuAncre(path) {
        const value = String(path || "");

        return (
          value.startsWith("#") ||
          value.startsWith("mailto:") ||
          value.startsWith("tel:") ||
          value.startsWith("http://") ||
          value.startsWith("https://") ||
          value.startsWith("data:")
        );
      }

      function urlAdmin(path) {
        const value = String(path || "");

        if (!value || estUrlExterneOuAncre(value)) {
          return value;
        }

        return typeof window.LCDP_urlAdmin === "function"
          ? window.LCDP_urlAdmin(value)
          : value;
      }

      function urlPublic(path) {
        const value = String(path || "");

        if (!value || estUrlExterneOuAncre(value)) {
          return value;
        }

        return typeof window.LCDP_urlPublic === "function"
          ? window.LCDP_urlPublic(value)
          : value;
      }

      function urlObjet(path) {
        const value = String(path || "");

        if (!value || estUrlExterneOuAncre(value)) {
          return value;
        }

        return typeof window.LCDP_urlObjet === "function"
          ? window.LCDP_urlObjet(value)
          : value;
      }

      function appliquerRoutes(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const path = element.dataset.siteHref || "";
          const space = element.dataset.space || "public";

          element.setAttribute(
            "href",
            space === "admin" ? urlAdmin(path) : urlPublic(path)
          );
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const path = String(element.dataset.siteSrc || "")
            .replace(/^\/?OBJET\/?/, "/");

          element.setAttribute("src", urlObjet(path));
        });
      }

      async function chargerFragment(url, label) {
        const response = await fetch(url, {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!response.ok) {
          throw new Error(label + " introuvable.");
        }

        const template = document.createElement("template");
        template.innerHTML = (await response.text()).trim();

        return template.content.cloneNode(true);
      }

      function chargerFragmentObjet(path) {
        return chargerFragment(
          urlObjet(path),
          "Fragment OBJET " + path
        );
      }

      function chargerFragmentAdmin(path) {
        return chargerFragment(
          urlAdmin(path),
          "Fragment ADMIN " + path
        );
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/box-bandeau-nav-admin.html"
        );

        slot.appendChild(fragment);
        appliquerRoutes(slot);
      }

      async function initialiserFooter() {
        const slot = document.getElementById("lcdp-footer-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentObjet("/BOX/02-box-footer.html");
        slot.appendChild(fragment);
        appliquerRoutes(slot);
      }

      function afficherCategorie(categorieId) {
        const categorie = categoriesAdmin.find(
          (item) => item.id === categorieId
        );

        if (!categorie) {
          return;
        }

        document
          .querySelectorAll("[data-lcdp-menu-gauche-admin-category]")
          .forEach((button) => {
            const active =
              button.dataset.lcdpMenuGaucheAdminCategory === categorie.id;

            button.setAttribute("aria-pressed", String(active));
          });

        const title = document.querySelector(
          "[data-lcdp-menu-centre-admin-title]"
        );

        const grid = document.querySelector(
          "[data-lcdp-mini-galerie-menu-centre-admin-grid]"
        );

        const template = document.querySelector(
          "[data-lcdp-mini-galerie-menu-centre-admin-template]"
        );

        if (!title || !grid || !template) {
          throw new Error("Structure du menu centre admin incomplète.");
        }

        title.textContent = categorie.titre;
        grid.innerHTML = "";

        categorie.rubriques.forEach((rubrique) => {
          const item = template.content.firstElementChild.cloneNode(true);
          const link = item.querySelector(
            "[data-lcdp-mini-galerie-menu-centre-admin-link]"
          );

          if (!link) {
            throw new Error("Bouton de mini galerie admin introuvable.");
          }

          link.textContent = rubrique.label;
          link.href = urlAdmin(rubrique.target);
          grid.appendChild(item);
        });
      }

      async function initialiserMenusAdmin() {
        const leftSlot = document.getElementById(
          "lcdp-menu-gauche-admin-slot"
        );

        const centerSlot = document.getElementById(
          "lcdp-menu-centre-admin-slot"
        );

        if (!leftSlot || !centerSlot) {
          return;
        }

        leftSlot.innerHTML = "";
        centerSlot.innerHTML = "";

        const [leftMenu, centerMenu] = await Promise.all([
          chargerFragmentAdmin(
            "/ESPACE-ADMIN/A_STRUCTURE/menu-gauche-admin.html"
          ),
          chargerFragmentAdmin(
            "/ESPACE-ADMIN/A_STRUCTURE/menu-centre-admin.html"
          )
        ]);

        leftSlot.appendChild(leftMenu);
        centerSlot.appendChild(centerMenu);

        const buttonSlot = leftSlot.querySelector(
          "[data-lcdp-menu-gauche-admin-slot]"
        );

        const gallerySlot = centerSlot.querySelector(
          "[data-lcdp-menu-centre-admin-contenu]"
        );

        if (!buttonSlot || !gallerySlot) {
          throw new Error("Structure des menus admin incomplète.");
        }

        const [genericButtonMenu, miniGallery] = await Promise.all([
          chargerFragmentObjet("/BOX/02-box-menu-bouton.html"),
          chargerFragmentAdmin(
            "/ESPACE-ADMIN/A_STRUCTURE/mini-galerie-menu-centre-admin.html"
          )
        ]);

        buttonSlot.appendChild(genericButtonMenu);
        gallerySlot.appendChild(miniGallery);

        const nav = buttonSlot.querySelector(
          "[data-lcdp-box-menu-bouton]"
        );

        const list = buttonSlot.querySelector(
          "[data-lcdp-menu-bouton-list]"
        );

        if (!nav || !list) {
          throw new Error("Objet 02-box-menu-bouton incomplet.");
        }

        nav.setAttribute("aria-label", "Catégories de l’espace admin");

        categoriesAdmin.forEach((categorie) => {
          const button = document.createElement("button");

          button.type = "button";
          button.className = "lcdp-button lcdp-button-primary";
          button.textContent = categorie.bouton;
          button.dataset.lcdpMenuGaucheAdminCategory = categorie.id;
          button.setAttribute("aria-pressed", "false");

          button.addEventListener("click", () => {
            afficherCategorie(categorie.id);
          });

          list.appendChild(button);
        });

        afficherCategorie("admin");
      }

      async function verifierSessionAdmin() {
        const guard = window.LCDP_GUARD_ADMIN;

        if (
          !guard ||
          typeof guard.verifierAccesPageAdmin !== "function"
        ) {
          throw new Error("Garde admin centralisé indisponible.");
        }

        return guard.verifierAccesPageAdmin();
      }

      async function initialiserPage() {
        const sessionValide = await verifierSessionAdmin();

        if (!sessionValide) {
          return;
        }

        await Promise.all([
          initialiserBandeau(),
          initialiserMenusAdmin()
        ]);

        const main = document.getElementById("lcdp-main-admin");

        if (main) {
          main.hidden = false;
        }

        initialiserFooter().catch((error) => {
          console.error("Erreur footer admin :", error);
        });
      }

      initialiserPage().catch((error) => {
        console.error(error);
      });
    })();
  </script>
</body>
</html>
