<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Dashboard Parc - Espace Admin - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Afficher et exporter la liste des parcs dans l'espace admin La Clé du Parc.">

  <script src="../../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function buildUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" + String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        buildUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;

      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_buildUrl = buildUrl;

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return buildUrl(publicBase, path);
      };

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        if (typeof config.adminUrl === "function") {
          return config.adminUrl(path);
        }

        return buildUrl(adminBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return buildUrl(objetBase, path);
      };

      const feuillesCssObjet = [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-footer.css",
        "/BOX/03-box-formulaire.css",
        "/BOX/03-box-champ-formulaire.css",
        "/BOX/02-box-alerte.css"
      ];

      feuillesCssObjet.forEach((chemin) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(chemin) +
          '">'
        );
      });
    })();
  </script>
</head>

<body>
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main" id="lcdp-main-admin-parc" hidden>
      <section class="lcdp-page-section" aria-label="Dashboard Parc">
        <div class="lcdp-page-container">
          <div class="lcdp-page-content lcdp-stack-large">

            <h1 class="lcdp-title-page-center">Dashboard Parc</h1>

            <p class="lcdp-text-strong-left">
              Consulter, filtrer, trier et exporter la liste des parcs.
            </p>

            <div id="lcdp-dashboard-parc-filtres-slot"></div>

            <div id="lcdp-dashboard-parc-table-slot"></div>

          </div>
        </div>
      </section>
    </main>

    <div id="lcdp-footer-slot"></div>
    <div id="lcdp-lightbox-slot"></div>

  </div>

  <script src="./admin-parc-dashboard-parc.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function estUrlExterneOuAncre(chemin) {
        const valeur = String(chemin || "");

        return (
          valeur.startsWith("#") ||
          valeur.startsWith("mailto:") ||
          valeur.startsWith("tel:") ||
          valeur.startsWith("http://") ||
          valeur.startsWith("https://") ||
          valeur.startsWith("data:")
        );
      }

      function construireUrlAdmin(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlAdmin === "function") {
          return window.LCDP_urlAdmin(valeur);
        }

        return valeur;
      }

      function construireUrlPublic(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlPublic === "function") {
          return window.LCDP_urlPublic(valeur);
        }

        return valeur;
      }

      function construireUrlObjet(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlObjet === "function") {
          return window.LCDP_urlObjet(valeur);
        }

        return valeur;
      }

      function appliquerRoutesSite(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const chemin = element.dataset.siteHref || "";
          const espace = element.dataset.space || "public";

          if (espace === "admin") {
            element.setAttribute("href", construireUrlAdmin(chemin));
            return;
          }

          element.setAttribute("href", construireUrlPublic(chemin));
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const chemin = element.dataset.siteSrc || "";
          const cheminObjet = chemin.replace(/^\/?OBJET\/?/, "/");
          element.setAttribute("src", construireUrlObjet(cheminObjet));
        });
      }

      async function chargerFragmentObjet(chemin) {
        const reponse = await fetch(construireUrlObjet(chemin), {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!reponse.ok) {
          throw new Error("Fragment OBJET introuvable : " + chemin);
        }

        const html = await reponse.text();
        const template = document.createElement("template");
        template.innerHTML = html.trim();

        return template.content.cloneNode(true);
      }

      function chargerScriptObjetUneFois(chemin) {
        const src = construireUrlObjet(chemin);

        if (document.querySelector(`script[data-lcdp-script-objet="${chemin}"]`)) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScriptObjet = chemin;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Script OBJET introuvable : " + chemin));
          document.body.appendChild(script);
        });
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const bandeau = await chargerFragmentObjet("/BOX/02-box-bandeau-nav.html");
        slot.appendChild(bandeau);

        const lienAccueil = slot.querySelector("[data-site-href]");

        if (lienAccueil) {
          lienAccueil.dataset.siteHref = "/ESPACE-ADMIN/accueil-admin.html";
          lienAccueil.dataset.space = "admin";
          lienAccueil.setAttribute("aria-label", "Accueil admin La Clé du Parc");
        }

        const libelleEspace = slot.querySelector("[data-lcdp-bandeau-nav-label]");

        if (libelleEspace) {
          libelleEspace.textContent = "Espace Admin";
          libelleEspace.hidden = false;
        }

        appliquerRoutesSite(slot);
      }

      async function initialiserFooter() {
        const slot = document.getElementById("lcdp-footer-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const footer = await chargerFragmentObjet("/BOX/02-box-footer.html");
        slot.appendChild(footer);

        appliquerRoutesSite(slot);
      }

      async function verifierSessionAdmin() {
        const endpointLogSessAdmin = String(
          config.workerLogSessAdminUrl ||
          config.WORKER_LOG_SESS_ADMIN_URL ||
          window.ADMIN_CONFIG?.API_LOG_SESS_AD ||
          ""
        ).replace(/\/+$/, "");

        const urlConnexionAdmin = construireUrlAdmin("/ESPACE-ADMIN/connexion-admin.html");

        if (!endpointLogSessAdmin) {
          window.location.href = urlConnexionAdmin;
          return false;
        }

        try {
          const reponse = await fetch(endpointLogSessAdmin + "/session", {
            method: "GET",
            credentials: "include",
            cache: "no-store",
            headers: {
              "Accept": "application/json"
            }
          });

          const data = await reponse.json().catch(() => null);

          if (!reponse.ok || !data || data.success !== true) {
            window.location.href = urlConnexionAdmin;
            return false;
          }

          return true;
        } catch (erreur) {
          console.error("Erreur session admin dashboard parc :", erreur);
          window.location.href = urlConnexionAdmin;
          return false;
        }
      }

      async function demarrerPage() {
        await initialiserBandeau();
        await initialiserFooter();

        const sessionOk = await verifierSessionAdmin();

        if (!sessionOk) {
          return;
        }

        await chargerScriptObjetUneFois("/BOX/03-box-formulaire.js");

        if (typeof window.LCDP_initialiserAdminParcDashboardParc === "function") {
          await window.LCDP_initialiserAdminParcDashboardParc({
            construireUrlAdmin,
            chargerFragmentObjet,
            appliquerRoutesSite
          });
        }

        const main = document.getElementById("lcdp-main-admin-parc");

        if (main) {
          main.hidden = false;
        }
      }

      appliquerRoutesSite(document);

      demarrerPage().catch((erreur) => {
        console.error(erreur);
      });
    })();
  </script>
</body>
</html>
