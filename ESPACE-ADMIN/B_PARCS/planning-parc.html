<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>PlanningParc - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Paramétrage IA du planning d’un parc dans l’espace admin."
  >

  <script src="../../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" +
          String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        return typeof config.adminUrl === "function"
          ? config.adminUrl(path)
          : construireUrl(adminBase, path);
      };

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        return typeof config.publicUrl === "function"
          ? config.publicUrl(path)
          : construireUrl(publicBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        return typeof config.objetUrl === "function"
          ? config.objetUrl(path)
          : construireUrl(objetBase, path);
      };

      [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-alerte.css",
        "/BOX/03-box-formulaire.css",
        "/BOX/03-box-champ-formulaire.css"
      ].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(path) +
          '">'
        );
      });

      document.write(
        '<link rel="stylesheet" href="' +
        window.LCDP_urlAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/css-admin.css"
        ) +
        '">'
      );
    })();
  </script>

  <script src="../A_STRUCTURE/guard-admin.js"></script>
  <script src="../A_STRUCTURE/menu-gauche-admin.js"></script>
  <script src="./planning-parc.js" defer></script>

  <style>
    .lcdp-page-planning-parc .lcdp-box-formulaire {
      margin-bottom: 22px;
    }

    .lcdp-page-planning-parc .lcdp-box-champ-formulaire {
      margin-bottom: 18px;
    }

    .lcdp-page-planning-parc .lcdp-box-champ-formulaire__input[type="number"] {
      width: min(100%, 220px);
    }

    .lcdp-page-planning-parc textarea.lcdp-box-champ-formulaire__input {
      min-height: 96px;
      resize: vertical;
    }

    .lcdp-page-planning-parc .lcdp-button-secondary[data-dictee-cible] {
      margin-top: 10px;
      min-width: 140px;
    }

    .lcdp-page-planning-parc .lcdp-box-formulaire__actions {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 18px 0 8px;
      margin-top: 8px;
    }

    .lcdp-page-planning-parc .lcdp-box-formulaire__actions .lcdp-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 280px);
      min-height: 52px;
      margin: 0;
      padding: 12px 18px;
      line-height: 1.25;
      text-align: center;
      border-radius: 14px;
    }

    .lcdp-page-planning-parc #lcdp-planning-status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f4f4ef;
      border: 1px solid #d9dccf;
    }

    .lcdp-page-planning-parc #lcdp-planning-status[data-etat="erreur"] {
      background: #fff1ef;
      border-color: #e2b7b0;
    }

    .lcdp-page-planning-parc #lcdp-planning-status[data-etat="succes"] {
      background: #f3f7ec;
      border-color: #cbd8b6;
    }

    .lcdp-page-planning-parc .lcdp-validation-bloc {
      margin-top: 12px;
      padding: 16px 18px;
      border: 1px solid #d8ddd0;
      border-radius: 14px;
      background: #fafaf7;
    }

    .lcdp-page-planning-parc .lcdp-validation-bloc h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .lcdp-page-planning-parc .lcdp-validation-liste {
      margin: 0;
      padding-left: 22px;
    }

    .lcdp-page-planning-parc .lcdp-validation-liste li + li {
      margin-top: 6px;
    }

    .lcdp-page-planning-parc #lcdp-planning-alertes {
      border-color: #efd4a2;
      background: #fff7e8;
    }

    .lcdp-page-planning-parc .lcdp-validation-note {
      margin: 12px 0 0;
      font-size: 0.95rem;
      color: #505a3d;
    }

    .lcdp-page-planning-parc details {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid #d8ddd0;
      border-radius: 12px;
      background: #fbfbf9;
    }

    .lcdp-page-planning-parc details summary {
      cursor: pointer;
      font-weight: 600;
    }

    .lcdp-page-planning-parc #lcdp-planning-json {
      margin: 12px 0 0;
      padding: 14px;
      max-height: 340px;
      overflow: auto;
      border-radius: 10px;
      background: #f2f4ef;
      font-size: 0.92rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .lcdp-page-planning-parc textarea.lcdp-box-champ-formulaire__input {
        min-height: 84px;
      }

      .lcdp-page-planning-parc .lcdp-box-formulaire__actions {
        gap: 12px;
      }

      .lcdp-page-planning-parc .lcdp-box-formulaire__actions .lcdp-button {
        width: 100%;
      }
    }
  </style>

</head>

<body class="lcdp-page-admin-interieure lcdp-page-planning-parc">
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main" id="lcdp-main-admin" hidden>
      <section
        class="lcdp-page-section"
        aria-label="Paramétrage du planning du parc"
      >
        <div class="lcdp-page-container">
          <div class="lcdp-admin-page-layout">

            <div id="lcdp-menu-gauche-admin-slot"></div>

            <div class="lcdp-admin-page-content">
              <section class="lcdp-box-formulaire">
                <header class="lcdp-box-formulaire__header">
                  <h1 class="lcdp-box-formulaire__title">
                    PlanningParc
                  </h1>

                  <p id="lcdp-planning-parc-identite">
                    Chargement du parc…
                  </p>
                </header>

                <form id="lcdp-planning-parc-form">
                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-planning-date-debut"
                    >
                      À partir de
                    </label>
                    <input
                      id="lcdp-planning-date-debut"
                      class="lcdp-box-champ-formulaire__input"
                      type="date"
                      required
                    >
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-planning-horizon"
                    >
                      Horizon
                    </label>
                    <input
                      id="lcdp-planning-horizon"
                      class="lcdp-box-champ-formulaire__input"
                      type="date"
                      required
                    >
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-planning-fermetures"
                    >
                      Dates de fermeture
                    </label>
                    <textarea
                      id="lcdp-planning-fermetures"
                      class="lcdp-box-champ-formulaire__input"
                      rows="2"
                      placeholder="Ex. Tous les lundis, le vendredi 11 septembre 2026 et le jeudi 26 novembre 2026."
                      required
                    ></textarea>
                    <button
                      class="lcdp-button lcdp-button-secondary"
                      type="button"
                      data-dictee-cible="lcdp-planning-fermetures"
                    >
                      Dicter
                    </button>
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-planning-semaine"
                    >
                      Ouverture semaine
                    </label>
                    <textarea
                      id="lcdp-planning-semaine"
                      class="lcdp-box-champ-formulaire__input"
                      rows="2"
                      placeholder="Ex. De 6 h à 22 h du lundi au vendredi jusqu’au 30 septembre 2026, puis de 6 h à 18 h."
                      required
                    ></textarea>
                    <button
                      class="lcdp-button lcdp-button-secondary"
                      type="button"
                      data-dictee-cible="lcdp-planning-semaine"
                    >
                      Dicter
                    </button>
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-planning-weekend"
                    >
                      Ouverture week-end
                    </label>
                    <textarea
                      id="lcdp-planning-weekend"
                      class="lcdp-box-champ-formulaire__input"
                      rows="2"
                      placeholder="Ex. De 6 h à 22 h le samedi et de 6 h à 21 h le dimanche."
                      required
                    ></textarea>
                    <button
                      class="lcdp-button lcdp-button-secondary"
                      type="button"
                      data-dictee-cible="lcdp-planning-weekend"
                    >
                      Dicter
                    </button>
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-planning-capacite"
                    >
                      Capacité d’accueil du parc
                    </label>
                    <input
                      id="lcdp-planning-capacite"
                      class="lcdp-box-champ-formulaire__input"
                      type="number"
                      min="1"
                      step="1"
                      required
                    >
                  </div>

                  <div class="lcdp-box-formulaire__actions">
                    <button
                      id="lcdp-planning-analyser"
                      class="lcdp-button lcdp-button-orange"
                      type="submit"
                    >
                      Analyser le brief IA
                    </button>
                  </div>
                </form>
              </section>

              <section
                id="lcdp-planning-validation"
                class="lcdp-box-formulaire"
                hidden
              >
                <header class="lcdp-box-formulaire__header">
                  <h2 class="lcdp-box-formulaire__title">
                    Validation du brief IA
                  </h2>
                </header>

                <div id="lcdp-planning-resume"></div>
                <div id="lcdp-planning-alertes" hidden></div>

                <details>
                  <summary>Voir le JSON proposé</summary>
                  <pre id="lcdp-planning-json"></pre>
                </details>

                <div class="lcdp-box-formulaire__actions">
                  <button
                    id="lcdp-planning-corriger"
                    class="lcdp-button lcdp-button-secondary"
                    type="button"
                  >
                    Corriger le brief
                  </button>

                  <button
                    id="lcdp-planning-valider"
                    class="lcdp-button lcdp-button-orange"
                    type="button"
                  >
                    Valider et écrire dans hparcs
                  </button>
                </div>
              </section>

              <p
                id="lcdp-planning-status"
                role="status"
                aria-live="polite"
                hidden
              ></p>
            </div>

          </div>
        </div>
      </section>
    </main>

  </div>
</body>
</html>
