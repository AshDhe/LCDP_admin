<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>InsertFamille - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Insertion du planning FAMILLE d’un parc dans l’espace admin."
  >

  <script src="../../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" +
          String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        return typeof config.adminUrl === "function"
          ? config.adminUrl(path)
          : construireUrl(adminBase, path);
      };

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        return typeof config.publicUrl === "function"
          ? config.publicUrl(path)
          : construireUrl(publicBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        return typeof config.objetUrl === "function"
          ? config.objetUrl(path)
          : construireUrl(objetBase, path);
      };

      [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-alerte.css",
        "/BOX/03-box-formulaire.css",
        "/BOX/03-box-champ-formulaire.css"
      ].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(path) +
          '">'
        );
      });

      document.write(
        '<link rel="stylesheet" href="' +
        window.LCDP_urlAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/css-admin.css"
        ) +
        '">'
      );
    })();
  </script>

  <script src="../A_STRUCTURE/guard-admin.js"></script>
  <script src="../A_STRUCTURE/menu-gauche-admin.js"></script>
  <script src="./InsertFamille.js" defer></script>

  <style>
    .lcdp-page-insert-famille .lcdp-box-formulaire__actions {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 22px 0 12px;
    }

    .lcdp-page-insert-famille .lcdp-box-formulaire__actions .lcdp-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 270px);
      min-height: 50px;
      margin: 0;
      padding: 10px 18px;
      line-height: 1.2;
      text-align: center;
    }

    .lcdp-insert-famille-regle-fermeture {
      padding: 12px 14px;
      border: 1px solid currentColor;
      border-radius: 12px;
    }
  </style>
</head>

<body class="lcdp-page-admin-interieure lcdp-page-insert-famille">
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main" id="lcdp-main-admin" hidden>
      <section
        class="lcdp-page-section"
        aria-label="Insertion du planning FAMILLE"
      >
        <div class="lcdp-page-container">
          <div class="lcdp-admin-page-layout">

            <div id="lcdp-menu-gauche-admin-slot"></div>

            <div class="lcdp-admin-page-content">
              <section class="lcdp-box-formulaire">
                <header class="lcdp-box-formulaire__header">
                  <h1 class="lcdp-box-formulaire__title">
                    InsertFamille
                  </h1>

                  <p id="lcdp-insert-famille-identite">
                    Chargement du parc…
                  </p>
                </header>

                <form id="lcdp-insert-famille-form">
                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-insert-famille-date-debut"
                    >
                      À partir de
                    </label>
                    <input
                      id="lcdp-insert-famille-date-debut"
                      class="lcdp-box-champ-formulaire__input"
                      type="date"
                      required
                    >
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-insert-famille-horizon"
                    >
                      Horizon
                    </label>
                    <input
                      id="lcdp-insert-famille-horizon"
                      class="lcdp-box-champ-formulaire__input"
                      type="date"
                      required
                    >
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <span class="lcdp-box-champ-formulaire__label">
                      Date de fermeture
                    </span>
                    <p class="lcdp-insert-famille-regle-fermeture">
                      Il n’y en a pas à saisir : le parc est fermé à
                      FAMILLE par défaut. Il est ouvert à FAMILLE
                      uniquement aux jours et horaires indiqués ci-dessous.
                    </p>
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-insert-famille-semaine"
                    >
                      Ouverture semaine
                    </label>
                    <textarea
                      id="lcdp-insert-famille-semaine"
                      class="lcdp-box-champ-formulaire__input"
                      rows="4"
                      placeholder="Ex. Tous les mercredis de 13 h à 18 h jusqu’au 30 septembre 2026, puis tous les mercredis de 13 h à 16 h à partir du 1er octobre 2026, et tous les vendredis de 16 h à 18 h jusqu’au 30 septembre 2026."
                      required
                    ></textarea>
                    <button
                      class="lcdp-button lcdp-button-secondary"
                      type="button"
                      data-dictee-cible="lcdp-insert-famille-semaine"
                    >
                      Dicter
                    </button>
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-insert-famille-weekend"
                    >
                      Ouverture week-end
                    </label>
                    <textarea
                      id="lcdp-insert-famille-weekend"
                      class="lcdp-box-champ-formulaire__input"
                      rows="3"
                      placeholder="Ex. De 10 h à 18 h le samedi et de 10 h à 18 h le dimanche."
                      required
                    ></textarea>
                    <button
                      class="lcdp-button lcdp-button-secondary"
                      type="button"
                      data-dictee-cible="lcdp-insert-famille-weekend"
                    >
                      Dicter
                    </button>
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label
                      class="lcdp-box-champ-formulaire__label"
                      for="lcdp-insert-famille-capacite"
                    >
                      Capacité d’accueil du parc pour FAMILLE
                    </label>
                    <input
                      id="lcdp-insert-famille-capacite"
                      class="lcdp-box-champ-formulaire__input"
                      type="number"
                      min="1"
                      step="1"
                      required
                    >
                  </div>

                  <div class="lcdp-box-formulaire__actions">
                    <button
                      id="lcdp-insert-famille-analyser"
                      class="lcdp-button lcdp-button-orange"
                      type="submit"
                    >
                      Analyser le brief IA
                    </button>
                  </div>
                </form>
              </section>

              <section
                id="lcdp-insert-famille-validation"
                class="lcdp-box-formulaire"
                hidden
              >
                <header class="lcdp-box-formulaire__header">
                  <h2 class="lcdp-box-formulaire__title">
                    Validation du brief IA FAMILLE
                  </h2>
                </header>

                <div id="lcdp-insert-famille-resume"></div>
                <div id="lcdp-insert-famille-alertes" hidden></div>

                <details>
                  <summary>Voir le JSON proposé</summary>
                  <pre id="lcdp-insert-famille-json"></pre>
                </details>

                <div class="lcdp-box-formulaire__actions">
                  <button
                    id="lcdp-insert-famille-corriger"
                    class="lcdp-button lcdp-button-secondary"
                    type="button"
                  >
                    Corriger le brief
                  </button>

                  <button
                    id="lcdp-insert-famille-valider"
                    class="lcdp-button lcdp-button-orange"
                    type="button"
                  >
                    Valider et écrire FAMILLE dans hparcs
                  </button>
                </div>
              </section>

              <p
                id="lcdp-insert-famille-status"
                role="status"
                aria-live="polite"
                hidden
              ></p>
            </div>

          </div>
        </div>
      </section>
    </main>

  </div>
</body>
</html>
