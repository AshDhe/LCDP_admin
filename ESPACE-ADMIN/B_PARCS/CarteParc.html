<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>CarteParc - La Clé du Parc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Carte administrative des parcs La Clé du Parc.">

  <script src="../../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" + String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl || config.ADMIN_BASE || config.siteBase || ""
      );
      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl || config.PUBLIC_BASE || ""
      );
      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl || config.OBJET_BASE || construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        return typeof config.adminUrl === "function"
          ? config.adminUrl(path)
          : construireUrl(adminBase, path);
      };

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        return typeof config.publicUrl === "function"
          ? config.publicUrl(path)
          : construireUrl(publicBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        return typeof config.objetUrl === "function"
          ? config.objetUrl(path)
          : construireUrl(objetBase, path);
      };

      [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-alerte.css",
        "/BOX/04-carte-dynamique.css",
        "/BOX/04-box-card-parc.css"
      ].forEach((path) => {
        document.write('<link rel="stylesheet" href="' + window.LCDP_urlObjet(path) + '">');
      });

      document.write(
        '<link rel="stylesheet" href="' +
        window.LCDP_urlAdmin("/ESPACE-ADMIN/A_STRUCTURE/css-admin.css") +
        '">'
      );
    })();
  </script>

  <script src="../A_STRUCTURE/guard-admin.js"></script>
</head>
<body class="lcdp-page-admin-interieure lcdp-page-carte-parc">
  <div class="lcdp-site-page">
    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main" id="lcdp-main-admin" hidden>
      <section class="lcdp-page-section" aria-label="Carte des parcs">
        <div class="lcdp-page-container">
          <div class="lcdp-admin-page-content" id="lcdp-carte-parc-slot"></div>
        </div>
      </section>
    </main>
  </div>
  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};
      const CHEMIN_OBJET_CARTE = "/BOX/04-carte-dynamique.html";
      const CHEMIN_GEOJSON_CARTE = "/BOX/04-carte-dynamique.geojson";
      const CHEMIN_OBJET_CARD_PARC = "/BOX/04-box-card-parc.html";
      const DOSSIER_IMAGES_PARC = "/IMAG/PARC";
      const NOM_IMAGE_CARD_PARC = "card1.webp";
      const STATUTS_AUTORISES = new Set([
        "recherche",
        "prepa",
        "non",
        "oui",
        "nonconforme",
        "acreuserfautinfo"
      ]);

      function urlAdmin(path) {
        return typeof window.LCDP_urlAdmin === "function"
          ? window.LCDP_urlAdmin(path)
          : path;
      }

      function urlObjet(path) {
        return typeof window.LCDP_urlObjet === "function"
          ? window.LCDP_urlObjet(path)
          : path;
      }

      function endpointAdminData() {
        return String(
          config.workerAdminDataUrl ||
          config.WORKER_ADMIN_DATA_URL ||
          window.ADMIN_CONFIG?.API_ADMIN_DATA ||
          ""
        ).replace(/\/+$/, "");
      }

      async function chargerFragment(url, libelle) {
        const response = await fetch(url, {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!response.ok) {
          throw new Error(libelle + " introuvable.");
        }

        const template = document.createElement("template");
        template.innerHTML = (await response.text()).trim();
        return template.content.cloneNode(true);
      }

      function appliquerRoutes(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const path = element.dataset.siteHref || "";
          const space = element.dataset.space || "public";
          element.setAttribute(
            "href",
            space === "admin" ? urlAdmin(path) : window.LCDP_urlPublic(path)
          );
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const path = String(element.dataset.siteSrc || "")
            .replace(/^\/?OBJET\/?/, "/");
          element.setAttribute("src", urlObjet(path));
        });
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");
        if (!slot) return;

        slot.innerHTML = "";
        const fragment = await chargerFragment(
          urlAdmin("/ESPACE-ADMIN/A_STRUCTURE/box-bandeau-nav-admin.html"),
          "Bandeau admin"
        );
        slot.appendChild(fragment);
        appliquerRoutes(slot);
      }

      function normaliserDepartement(value) {
        const brut = String(value || "")
          .trim()
          .toUpperCase()
          .replace(/\s+/g, "");

        if (brut === "2A" || brut === "2B") {
          return brut;
        }

        if (/^\d{1,2}$/.test(brut)) {
          return brut.padStart(2, "0");
        }

        return "";
      }

      function lireDepartements(value, featuresParCode) {
        const brut = String(value || "").trim();

        if (!brut) {
          return [];
        }

        return Array.from(
          new Set(
            brut
              .split("|")
              .map(normaliserDepartement)
              .filter((code) => code && featuresParCode.has(code))
          )
        );
      }

      function normaliserEtat(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[\s_-]+/g, "");
      }

      function projeterCoordonnee(longitude, latitude) {
        const lon = Number(longitude);
        const lat = Number(latitude);

        if (!Number.isFinite(lon) || !Number.isFinite(lat)) {
          return null;
        }

        const latitudeBornee = Math.max(
          -85.05112878,
          Math.min(85.05112878, lat)
        );
        const latitudeRadians = latitudeBornee * Math.PI / 180;
        const sinus = Math.sin(latitudeRadians);

        return {
          x: ((lon + 180) / 360) * 1000,
          y: (
            0.5 -
            Math.log((1 + sinus) / (1 - sinus)) /
              (4 * Math.PI)
          ) * 1000
        };
      }

      function construireTraceGeometrie(geometry) {
        const type = String(geometry?.type || "");
        const coordinates = geometry?.coordinates;
        const parties = [];
        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        function ajouterAnneau(anneau) {
          if (!Array.isArray(anneau) || anneau.length < 3) {
            return;
          }

          const points = anneau
            .map((coord) => projeterCoordonnee(coord?.[0], coord?.[1]))
            .filter(Boolean);

          if (points.length < 3) {
            return;
          }

          points.forEach((point) => {
            minX = Math.min(minX, point.x);
            minY = Math.min(minY, point.y);
            maxX = Math.max(maxX, point.x);
            maxY = Math.max(maxY, point.y);
          });

          parties.push(
            "M " +
            points
              .map((point) => {
                return point.x.toFixed(4) + " " + point.y.toFixed(4);
              })
              .join(" L ") +
            " Z"
          );
        }

        if (type === "Polygon" && Array.isArray(coordinates)) {
          coordinates.forEach(ajouterAnneau);
        } else if (
          type === "MultiPolygon" &&
          Array.isArray(coordinates)
        ) {
          coordinates.forEach((polygone) => {
            if (Array.isArray(polygone)) {
              polygone.forEach(ajouterAnneau);
            }
          });
        }

        if (
          parties.length === 0 ||
          !Number.isFinite(minX) ||
          !Number.isFinite(minY) ||
          !Number.isFinite(maxX) ||
          !Number.isFinite(maxY)
        ) {
          return null;
        }

        return {
          d: parties.join(" "),
          bbox: [minX, minY, maxX, maxY]
        };
      }

      function fusionnerBbox(boxes) {
        const valides = boxes.filter((bbox) => {
          return (
            Array.isArray(bbox) &&
            bbox.length === 4 &&
            bbox.every(Number.isFinite)
          );
        });

        if (valides.length === 0) {
          return null;
        }

        return [
          Math.min(...valides.map((bbox) => bbox[0])),
          Math.min(...valides.map((bbox) => bbox[1])),
          Math.max(...valides.map((bbox) => bbox[2])),
          Math.max(...valides.map((bbox) => bbox[3]))
        ];
      }

      function bboxVersViewBox(bbox, ratioMarge = 0.12) {
        if (!bbox) {
          return null;
        }

        const largeur = Math.max(0.5, bbox[2] - bbox[0]);
        const hauteur = Math.max(0.5, bbox[3] - bbox[1]);
        const marge = Math.max(
          0.35,
          Math.max(largeur, hauteur) * ratioMarge
        );

        return [
          bbox[0] - marge,
          bbox[1] - marge,
          largeur + marge * 2,
          hauteur + marge * 2
        ];
      }

      function calculerViewBox(
        codes,
        featuresParCode,
        viewBoxFrance
      ) {
        if (codes.length === 0) {
          return [...viewBoxFrance];
        }

        const bbox = fusionnerBbox(
          codes
            .map((code) => featuresParCode.get(code)?.bboxProjetee)
            .filter(Boolean)
        );

        return bboxVersViewBox(bbox, 0.16) || [...viewBoxFrance];
      }

      function creerElementSvg(nom) {
        return document.createElementNS("http://www.w3.org/2000/svg", nom);
      }
      async function initialiserCarte() {
        const slot = document.getElementById("lcdp-carte-parc-slot");
        if (!slot) throw new Error("Slot CarteParc introuvable.");

        const main = document.getElementById("lcdp-main-admin");
        if (main) main.hidden = false;
        slot.textContent = "Chargement de CarteParc…";

        const [fragment, geojsonResponse, fragmentCardParc] = await Promise.all([
          chargerFragment(urlObjet(CHEMIN_OBJET_CARTE), "Objet carte dynamique"),
          fetch(urlObjet(CHEMIN_GEOJSON_CARTE), {
            method: "GET",
            credentials: "omit",
            cache: "no-cache"
          }),
          chargerFragment(urlObjet(CHEMIN_OBJET_CARD_PARC), "Objet Card Parc")
        ]);

        if (!geojsonResponse.ok) {
          throw new Error("GeoJSON de la carte introuvable.");
        }

        const geojson = await geojsonResponse.json();
        const features = Array.isArray(geojson?.features)
          ? geojson.features
          : [];

        if (features.length === 0) {
          throw new Error("Données cartographiques incomplètes.");
        }

        slot.innerHTML = "";
        slot.appendChild(fragment);

        const form = slot.querySelector("[data-lcdp-carte-filters]");
        const inputGeo = slot.querySelector("[data-lcdp-carte-geo]");
        const inputEtat = slot.querySelector("[data-lcdp-carte-etat]");
        const statutTexte = slot.querySelector("[data-lcdp-carte-status]");
        const svg = slot.querySelector("[data-lcdp-carte-svg]");
        const boutonZoomPlus = slot.querySelector("[data-lcdp-carte-zoom-plus]");
        const boutonZoomMoins = slot.querySelector("[data-lcdp-carte-zoom-moins]");
        const coucheDepartements = slot.querySelector("[data-lcdp-carte-departements-layer]");
        const coucheSelection = slot.querySelector("[data-lcdp-carte-selection-layer]");
        const coucheLocalites = slot.querySelector("[data-lcdp-carte-localites-layer]");
        const coucheParcs = slot.querySelector("[data-lcdp-carte-parcs-layer]");
        const cardSlot = slot.querySelector("[data-lcdp-carte-card-slot]");
        const templateCardParc = fragmentCardParc.querySelector(
          "[data-lcdp-box-card-parc]"
        );

        if (
          !form ||
          !inputGeo ||
          !inputEtat ||
          !statutTexte ||
          !svg ||
          !boutonZoomPlus ||
          !boutonZoomMoins ||
          !coucheDepartements ||
          !coucheSelection ||
          !coucheLocalites ||
          !coucheParcs ||
          !cardSlot ||
          !templateCardParc
        ) {
          throw new Error("Structure de l’objet carte dynamique incomplète.");
        }

        const featuresParCode = new Map();
        const pathsParCode = new Map();
        const traces = [];

        features.forEach((feature) => {
          const code = String(feature?.properties?.code || "");
          const trace = construireTraceGeometrie(feature?.geometry);

          if (!code || !trace) {
            return;
          }

          traces.push({
            feature,
            code,
            trace
          });
        });

        const bboxFrance = fusionnerBbox(
          traces.map((item) => item.trace.bbox)
        );
        const viewBoxFrance = bboxVersViewBox(bboxFrance, 0.045);

        if (!viewBoxFrance) {
          throw new Error("Emprise de la carte inexploitable.");
        }

        const etendueCarte = [...viewBoxFrance];
        let viewBoxCourante = [...viewBoxFrance];
        let glissement = null;

        function normaliserViewBox(viewBox) {
          const minLargeur = Math.max(0.45, viewBoxFrance[2] / 35);
          const minHauteur = Math.max(0.45, viewBoxFrance[3] / 35);
          const maxLargeur = viewBoxFrance[2];
          const maxHauteur = viewBoxFrance[3];
          const largeur = Math.min(maxLargeur, Math.max(minLargeur, Number(viewBox[2]) || maxLargeur));
          const hauteur = Math.min(maxHauteur, Math.max(minHauteur, Number(viewBox[3]) || maxHauteur));
          const xMinimum = etendueCarte[0];
          const yMinimum = etendueCarte[1];
          const xMaximum = etendueCarte[0] + etendueCarte[2] - largeur;
          const yMaximum = etendueCarte[1] + etendueCarte[3] - hauteur;
          const x = Math.min(Math.max(Number(viewBox[0]) || 0, xMinimum), Math.max(xMinimum, xMaximum));
          const y = Math.min(Math.max(Number(viewBox[1]) || 0, yMinimum), Math.max(yMinimum, yMaximum));
          return [x, y, largeur, hauteur];
        }

        function actualiserTailleElementsCarte() {
          const largeurEcran = Math.max(
            1,
            svg.getBoundingClientRect().width
          );
          const uniteEcran = viewBoxCourante[2] / largeurEcran;
          const rayonParc = Math.max(0.04, uniteEcran * 6);
          const rayonLocalite = Math.max(0.035, uniteEcran * 4.2);
          const tailleLibelle = Math.max(0.12, uniteEcran * 11);
          const decalageLibelle = Math.max(0.08, uniteEcran * 7);

          coucheParcs
            .querySelectorAll(".lcdp-carte-dynamique__marker")
            .forEach((marker) => {
              marker.setAttribute("r", String(rayonParc));
            });

          coucheLocalites
            .querySelectorAll(".lcdp-carte-dynamique__localite-marker")
            .forEach((marker) => {
              marker.setAttribute("r", String(rayonLocalite));
            });

          coucheLocalites
            .querySelectorAll(".lcdp-carte-dynamique__localite-label")
            .forEach((libelle) => {
              const x = Number(libelle.dataset.pointX);

              libelle.setAttribute("font-size", String(tailleLibelle));

              if (Number.isFinite(x)) {
                libelle.setAttribute("x", String(x + decalageLibelle));
              }
            });
        }

        function appliquerViewBox(viewBox) {
          viewBoxCourante = normaliserViewBox(viewBox);
          svg.setAttribute("viewBox", viewBoxCourante.join(" "));
          actualiserTailleElementsCarte();
        }

        function pointSvgDepuisEcran(clientX, clientY) {
          const point = svg.createSVGPoint();
          point.x = clientX;
          point.y = clientY;
          const matrice = svg.getScreenCTM();
          return matrice
            ? point.matrixTransform(matrice.inverse())
            : {
                x: viewBoxCourante[0] + viewBoxCourante[2] / 2,
                y: viewBoxCourante[1] + viewBoxCourante[3] / 2
              };
        }

        function zoomerCarte(facteur, centre = null) {
          const [x, y, largeur, hauteur] = viewBoxCourante;
          const pointCentre = centre || {
            x: x + largeur / 2,
            y: y + hauteur / 2
          };
          const nouvelleLargeur = largeur * facteur;
          const nouvelleHauteur = hauteur * facteur;
          const ratioX = (pointCentre.x - x) / largeur;
          const ratioY = (pointCentre.y - y) / hauteur;

          appliquerViewBox([
            pointCentre.x - nouvelleLargeur * ratioX,
            pointCentre.y - nouvelleHauteur * ratioY,
            nouvelleLargeur,
            nouvelleHauteur
          ]);
        }

        traces.forEach(({ feature, code, trace }) => {
          const nom = String(feature?.properties?.nom || code);
          const featureCarte = {
            ...feature,
            bboxProjetee: trace.bbox
          };

          featuresParCode.set(code, featureCarte);

          const path = creerElementSvg("path");
          path.setAttribute("d", trace.d);
          path.setAttribute(
            "class",
            "lcdp-carte-dynamique__departement"
          );
          path.setAttribute("fill-rule", "evenodd");
          path.dataset.code = code;

          const title = creerElementSvg("title");
          title.textContent = code + " · " + nom;
          path.appendChild(title);

          coucheDepartements.appendChild(path);
          pathsParCode.set(code, path);
        });

        function actualiserSelectionVisuelle(codes) {
          const selection = new Set(codes);

          coucheSelection.innerHTML = "";

          pathsParCode.forEach((path, code) => {
            const selectionne = selection.has(code);

            path.classList.toggle("is-selected", selectionne);

            if (!selectionne) {
              return;
            }

            const surlignage = creerElementSvg("path");
            surlignage.setAttribute("d", path.getAttribute("d") || "");
            surlignage.setAttribute(
              "class",
              "lcdp-carte-dynamique__departement-selection"
            );
            surlignage.setAttribute("fill-rule", "evenodd");
            surlignage.setAttribute("aria-hidden", "true");
            coucheSelection.appendChild(surlignage);
          });

          appliquerViewBox(
            calculerViewBox(
              codes,
              featuresParCode,
              viewBoxFrance
            )
          );
        }

        boutonZoomPlus.addEventListener("click", () => zoomerCarte(0.8));
        boutonZoomMoins.addEventListener("click", () => zoomerCarte(1.25));

        svg.addEventListener("wheel", (event) => {
          event.preventDefault();
          const centre = pointSvgDepuisEcran(event.clientX, event.clientY);
          zoomerCarte(event.deltaY < 0 ? 0.85 : 1.18, centre);
        }, { passive: false });

        svg.addEventListener("pointerdown", (event) => {
          if (event.button !== 0) return;
          glissement = {
            pointerId: event.pointerId,
            clientX: event.clientX,
            clientY: event.clientY,
            viewBox: [...viewBoxCourante]
          };
          svg.setPointerCapture(event.pointerId);
          svg.classList.add("is-dragging");
        });

        svg.addEventListener("pointermove", (event) => {
          if (!glissement || glissement.pointerId !== event.pointerId) return;
          const rect = svg.getBoundingClientRect();
          const deplacementX =
            (event.clientX - glissement.clientX) *
            glissement.viewBox[2] / Math.max(1, rect.width);
          const deplacementY =
            (event.clientY - glissement.clientY) *
            glissement.viewBox[3] / Math.max(1, rect.height);

          appliquerViewBox([
            glissement.viewBox[0] - deplacementX,
            glissement.viewBox[1] - deplacementY,
            glissement.viewBox[2],
            glissement.viewBox[3]
          ]);
        });

        function terminerGlissement(event) {
          if (!glissement || glissement.pointerId !== event.pointerId) return;
          if (svg.hasPointerCapture(event.pointerId)) {
            svg.releasePointerCapture(event.pointerId);
          }
          glissement = null;
          svg.classList.remove("is-dragging");
        }

        svg.addEventListener("pointerup", terminerGlissement);
        svg.addEventListener("pointercancel", terminerGlissement);

        function fermerCardParc() {
          cardSlot.innerHTML = "";
          cardSlot.hidden = true;
        }

        function dossierParcDepuisNom(nom) {
          return String(nom || "")
            .trim()
            .replace(/\s+/g, "_");
        }

        function construireUrlImageCardParc(parc) {
          const dptmt = normaliserDepartement(parc?.dptmt);
          const dossierParc = dossierParcDepuisNom(parc?.nom);

          if (!dptmt || !dossierParc) {
            return "";
          }

          return urlObjet(
            DOSSIER_IMAGES_PARC +
            "/" + encodeURIComponent(dptmt) +
            "/" + encodeURIComponent(dossierParc) +
            "/" + NOM_IMAGE_CARD_PARC
          );
        }

        function ouvrirCardParc(parc) {
          const card = templateCardParc.cloneNode(true);
          const image = card.querySelector("[data-lcdp-card-parc-image]");
          const media = card.querySelector(".lcdp-box-card-parc__media");
          const titre = card.querySelector("[data-lcdp-card-parc-title]");
          const meta = card.querySelector("[data-lcdp-card-parc-meta]");
          const description = card.querySelector(
            "[data-lcdp-card-parc-description]"
          );
          const actions = card.querySelector(".lcdp-box-card-parc__actions");

          if (titre) {
            titre.textContent = String(parc?.nom || "Parc");
          }

          if (meta) {
            meta.textContent = parc?.dptmt
              ? "Département " + String(parc.dptmt)
              : "";
          }

          if (description) {
            description.hidden = true;
            description.textContent = "";
          }

          if (actions) {
            actions.remove();
          }

          if (image) {
            const src = construireUrlImageCardParc(parc);

            if (src) {
              image.src = src;
              image.alt = "Image du parc " + String(parc?.nom || "");
              image.addEventListener(
                "error",
                () => {
                  if (media) {
                    media.hidden = true;
                  }
                },
                { once: true }
              );
            } else if (media) {
              media.hidden = true;
            }
          }

          const boutonFermerCard = document.createElement("button");
          boutonFermerCard.type = "button";
          boutonFermerCard.className =
            "lcdp-carte-dynamique__card-close";
          boutonFermerCard.textContent = "×";
          boutonFermerCard.setAttribute("aria-label", "Fermer la Card Parc");
          boutonFermerCard.addEventListener("click", fermerCardParc);

          cardSlot.replaceChildren(boutonFermerCard, card);
          cardSlot.hidden = false;
          boutonFermerCard.focus();
        }

        function dessinerLocalites(localites) {
          coucheLocalites.innerHTML = "";

          (Array.isArray(localites) ? localites : []).forEach((localite) => {
            const point = projeterCoordonnee(
              localite.longitude,
              localite.latitude
            );

            if (!point) {
              return;
            }

            const groupe = creerElementSvg("g");
            groupe.setAttribute("aria-hidden", "true");

            const marker = creerElementSvg("circle");
            marker.setAttribute("cx", String(point.x));
            marker.setAttribute("cy", String(point.y));
            marker.setAttribute("r", "0.1");
            marker.setAttribute(
              "class",
              "lcdp-carte-dynamique__localite-marker"
            );

            const libelle = creerElementSvg("text");
            libelle.setAttribute("x", String(point.x));
            libelle.setAttribute("y", String(point.y));
            libelle.setAttribute("dominant-baseline", "middle");
            libelle.setAttribute(
              "class",
              "lcdp-carte-dynamique__localite-label"
            );
            libelle.dataset.pointX = String(point.x);
            libelle.textContent = String(localite.nom || "")
              .trim()
              .toLocaleUpperCase("fr");

            groupe.appendChild(marker);
            groupe.appendChild(libelle);
            coucheLocalites.appendChild(groupe);
          });

          actualiserTailleElementsCarte();
        }

        function dessinerParcs(rows) {
          coucheParcs.innerHTML = "";

          rows.forEach((parc) => {
            const point = projeterCoordonnee(
              parc.longitude,
              parc.latitude
            );
            if (!point) return;

            const marker = creerElementSvg("circle");
            marker.setAttribute("cx", String(point.x));
            marker.setAttribute("cy", String(point.y));
            marker.setAttribute("r", "0.1");
            marker.setAttribute("class", "lcdp-carte-dynamique__marker");
            marker.setAttribute("tabindex", "0");
            marker.setAttribute("role", "button");
            marker.dataset.statut = String(parc.statut || "");
            marker.setAttribute(
              "aria-label",
              "Ouvrir la Card Parc de " + String(parc.nom || "Parc")
            );

            marker.addEventListener("pointerdown", (event) => {
              event.stopPropagation();
            });

            marker.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              ouvrirCardParc(parc);
            });

            marker.addEventListener("keydown", (event) => {
              if (event.key !== "Enter" && event.key !== " ") {
                return;
              }

              event.preventDefault();
              event.stopPropagation();
              ouvrirCardParc(parc);
            });

            coucheParcs.appendChild(marker);
          });

          actualiserTailleElementsCarte();
        }

        window.addEventListener(
          "resize",
          actualiserTailleElementsCarte
        );

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !cardSlot.hidden) {
            fermerCardParc();
          }
        });

        let temporisation = null;
        let numeroRequete = 0;

        async function chargerParcs() {
          const endpoint = endpointAdminData();
          if (!endpoint) throw new Error("Endpoint admin data non configuré.");

          const codes = lireDepartements(inputGeo.value, featuresParCode);
          const etat = normaliserEtat(inputEtat.value);

          fermerCardParc();
          actualiserSelectionVisuelle(codes);

          if (etat && !STATUTS_AUTORISES.has(etat)) {
            coucheLocalites.innerHTML = "";
            coucheParcs.innerHTML = "";
            statutTexte.textContent = "Filtre état invalide.";
            return;
          }

          const requeteCourante = ++numeroRequete;
          statutTexte.textContent = "Chargement des parcs…";

          const params = new URLSearchParams();
          if (etat) {
            params.set("statut", etat);
          }
          if (codes.length > 0) {
            params.set("dptmt", codes.join("|"));
          }

          const response = await fetch(endpoint + "/carte-parc?" + params.toString(), {
            method: "GET",
            credentials: "include",
            cache: "no-store",
            headers: { Accept: "application/json" }
          });

          const data = await response.json().catch(() => null);

          if (requeteCourante !== numeroRequete) {
            return;
          }

          if (!response.ok || !data || data.success !== true) {
            throw new Error(data?.message || data?.detail || "Lecture des parcs impossible.");
          }

          dessinerLocalites(
            Array.isArray(data.localites) ? data.localites : []
          );
          dessinerParcs(Array.isArray(data.rows) ? data.rows : []);
          statutTexte.textContent = "";
        }

        function programmerActualisation() {
          window.clearTimeout(temporisation);
          temporisation = window.setTimeout(() => {
            chargerParcs().catch((error) => {
              statutTexte.textContent = String(error?.message || error || "");
            });
          }, 280);
        }

        inputGeo.addEventListener("input", programmerActualisation);
        inputEtat.addEventListener("input", programmerActualisation);

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          programmerActualisation();
        });

        appliquerViewBox(viewBoxFrance);
        actualiserSelectionVisuelle([]);
        await chargerParcs();

      }

      async function verifierSessionAdmin() {
        const guard = window.LCDP_GUARD_ADMIN;
        if (!guard || typeof guard.verifierAccesPageAdmin !== "function") {
          throw new Error("Garde admin centralisé indisponible.");
        }
        return guard.verifierAccesPageAdmin();
      }

      async function initialiserPage() {
        const sessionValide = await verifierSessionAdmin();
        if (!sessionValide) return;

        const main = document.getElementById("lcdp-main-admin");
        if (main) main.hidden = false;

        await Promise.all([initialiserBandeau(), initialiserCarte()]);
      }

      initialiserPage().catch((error) => {
        console.error(error);
        const main = document.getElementById("lcdp-main-admin");
        if (main) main.hidden = false;
        const slot = document.getElementById("lcdp-carte-parc-slot");
        if (slot) {
          slot.textContent = "CarteParc indisponible : " +
            String(error?.message || error || "");
        }
      });
    })();
  </script>
</body>
</html>
