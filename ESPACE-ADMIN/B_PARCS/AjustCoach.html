<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>AjustCoach - La Clé du Parc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Ajustement exclusif du planning COACH.">

  <script src="../../config.js"></script>
  <script>
    (() => {
      "use strict";
      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" +
          String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );
      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );
      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = (path) =>
        typeof config.adminUrl === "function"
          ? config.adminUrl(path)
          : construireUrl(adminBase, path);

      window.LCDP_urlPublic = (path) =>
        typeof config.publicUrl === "function"
          ? config.publicUrl(path)
          : construireUrl(publicBase, path);

      window.LCDP_urlObjet = (path) =>
        typeof config.objetUrl === "function"
          ? config.objetUrl(path)
          : construireUrl(objetBase, path);

      [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-alerte.css",
        "/BOX/02-box-dialogue-bouton.css",
        "/BOX/03-box-formulaire.css",
        "/BOX/03-box-champ-formulaire.css"
      ].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(path) +
          '">'
        );
      });

      document.write(
        '<link rel="stylesheet" href="' +
        window.LCDP_urlAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/css-admin.css"
        ) +
        '">'
      );
    })();
  </script>

  <script src="../A_STRUCTURE/guard-admin.js"></script>
  <script src="../A_STRUCTURE/menu-gauche-admin.js"></script>
  <script src="./AjustCoach.js?v=20260717-1500" defer></script>

  <style>
    .lcdp-page-planning-workflow .lcdp-box-formulaire {
      margin-bottom: 22px;
    }

    .lcdp-page-planning-workflow .lcdp-box-formulaire__actions {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 22px 0 12px;
    }

    .lcdp-page-planning-workflow .lcdp-box-formulaire__actions .lcdp-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 280px);
      min-height: 50px;
      margin: 0;
      padding: 10px 18px;
      line-height: 1.2;
      text-align: center;
    }

    .lcdp-workflow-intro,
    .lcdp-workflow-disabled {
      margin: 0 0 20px;
      padding: 14px 16px;
      border: 1px solid #cfd5c6;
      border-radius: 14px;
      background: #f8f9f5;
      line-height: 1.5;
    }

    .lcdp-workflow-disabled {
      border-color: #efd4a2;
      background: #fff7e8;
    }

    .lcdp-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .lcdp-form-grid--three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .lcdp-schedule-card {
      margin-bottom: 18px;
      padding: 18px;
      border: 1px solid #d8ddd0;
      border-radius: 16px;
      background: #fbfbf8;
    }

    .lcdp-schedule-card__title {
      margin: 0 0 14px;
      font-size: 1.05rem;
    }

    .lcdp-time-range {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr);
      gap: 10px;
      align-items: end;
    }

    .lcdp-time-range__arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      font-size: 1.35rem;
      color: #596351;
    }

    .lcdp-day-selector {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .lcdp-day-selector label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
      padding: 8px 6px;
      border: 1px solid #d8ddd0;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
    }

    .lcdp-day-selector input {
      margin: 0;
    }

    .lcdp-page-planning-workflow textarea.lcdp-box-champ-formulaire__input {
      min-height: 92px;
      resize: vertical;
    }

    .lcdp-page-planning-workflow .lcdp-button-secondary[data-dictee-cible] {
      margin-top: 10px;
      min-width: 140px;
    }

    .lcdp-page-planning-workflow [role="status"] {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #d9dccf;
      border-radius: 12px;
      background: #f4f4ef;
    }

    .lcdp-page-planning-workflow [role="status"][data-etat="erreur"] {
      border-color: #e2b7b0;
      background: #fff1ef;
    }

    .lcdp-page-planning-workflow [role="status"][data-etat="succes"] {
      border-color: #cbd8b6;
      background: #f3f7ec;
    }

    .lcdp-validation-bloc {
      margin-top: 12px;
      padding: 16px 18px;
      border: 1px solid #d8ddd0;
      border-radius: 14px;
      background: #fafaf7;
    }

    .lcdp-validation-bloc h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .lcdp-validation-liste {
      margin: 0;
      padding-left: 22px;
    }

    .lcdp-validation-alertes {
      border-color: #efd4a2;
      background: #fff7e8;
    }

    .lcdp-validation-note {
      margin: 12px 0 0;
      font-size: 0.95rem;
      color: #505a3d;
    }

    .lcdp-page-planning-workflow details {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid #d8ddd0;
      border-radius: 12px;
      background: #fbfbf9;
    }

    .lcdp-page-planning-workflow pre {
      margin: 12px 0 0;
      padding: 14px;
      max-height: 340px;
      overflow: auto;
      border-radius: 10px;
      background: #f2f4ef;
      font-size: 0.92rem;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .lcdp-page-planning-workflow .lcdp-box-dialogue-bouton__actions {
      grid-template-columns: repeat(2, minmax(0, 200px));
      justify-content: center;
    }

    [data-capacite-zone][hidden] {
      display: none !important;
    }

    @media (max-width: 900px) {
      .lcdp-form-grid,
      .lcdp-form-grid--three {
        grid-template-columns: 1fr;
      }

      .lcdp-day-selector {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      .lcdp-time-range {
        grid-template-columns: 1fr;
      }

      .lcdp-time-range__arrow {
        min-height: auto;
        transform: rotate(90deg);
      }

      .lcdp-day-selector {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .lcdp-page-planning-workflow .lcdp-box-dialogue-bouton__actions {
        grid-template-columns: 1fr;
      }

      .lcdp-page-planning-workflow .lcdp-box-formulaire__actions .lcdp-button {
        width: 100%;
      }
    }
  </style>

</head>
<body class="lcdp-page-admin-interieure lcdp-page-planning-workflow lcdp-page-ajust-coach">
  <div class="lcdp-site-page">
    <div id="lcdp-bandeau-slot"></div>
    <main class="lcdp-site-main" id="lcdp-main-admin" hidden>
      <section class="lcdp-page-section" aria-label="AjustCoach">
        <div class="lcdp-page-container">
          <div class="lcdp-admin-page-layout">
            <div id="lcdp-menu-gauche-admin-slot"></div>
            <div class="lcdp-admin-page-content">

              <section class="lcdp-box-formulaire">
                <header class="lcdp-box-formulaire__header">
                  <h1 class="lcdp-box-formulaire__title">AjustCoach</h1>
                  <p id="lcdp-ajust-coach-identite">Chargement du parc…</p>
                </header>
                <p class="lcdp-workflow-intro">
                  L’ouverture réserve exclusivement COACH. La fermeture annule cet ajustement exclusif et restaure DUO, COACH ou FAMILLE uniquement lorsque leur capacité historique existe.
                </p>
                <form id="lcdp-ajust-coach-form">
                  <div class="lcdp-box-champ-formulaire">
                    <label class="lcdp-box-champ-formulaire__label" for="lcdp-ajust-coach-action">Action</label>
                    <select id="lcdp-ajust-coach-action" class="lcdp-box-champ-formulaire__input">
                      <option value="ouvrir">Réserver exclusivement COACH</option>
                      <option value="fermer">Annuler l’AjustCoach</option>
                    </select>
                  </div>

                  <div class="lcdp-form-grid">
                    <div class="lcdp-box-champ-formulaire">
                      <label class="lcdp-box-champ-formulaire__label" for="lcdp-ajust-coach-date-debut">Début de la période</label>
                      <input id="lcdp-ajust-coach-date-debut" class="lcdp-box-champ-formulaire__input" type="date" required>
                    </div>
                    <div class="lcdp-box-champ-formulaire">
                      <label class="lcdp-box-champ-formulaire__label" for="lcdp-ajust-coach-date-fin">Fin de la période</label>
                      <input id="lcdp-ajust-coach-date-fin" class="lcdp-box-champ-formulaire__input" type="date" required>
                    </div>
                  </div>

                  <section class="lcdp-schedule-card">
                    <h2 class="lcdp-schedule-card__title">Jours et plage horaire</h2>
                    
                    <div class="lcdp-day-selector" aria-label="Jours concernés">
                      <label><input type="checkbox" name="lcdp-ajust-coach-jour" value="lundi" checked> Lun</label>
                      <label><input type="checkbox" name="lcdp-ajust-coach-jour" value="mardi" checked> Mar</label>
                      <label><input type="checkbox" name="lcdp-ajust-coach-jour" value="mercredi" checked> Mer</label>
                      <label><input type="checkbox" name="lcdp-ajust-coach-jour" value="jeudi" checked> Jeu</label>
                      <label><input type="checkbox" name="lcdp-ajust-coach-jour" value="vendredi" checked> Ven</label>
                      <label><input type="checkbox" name="lcdp-ajust-coach-jour" value="samedi" checked> Sam</label>
                      <label><input type="checkbox" name="lcdp-ajust-coach-jour" value="dimanche" checked> Dim</label>
                    </div>

                    <div style="margin-top:16px">
                    <div class="lcdp-time-range">
                      <div class="lcdp-box-champ-formulaire">
                        <label class="lcdp-box-champ-formulaire__label" for="lcdp-ajust-coach-debut">Début</label>
                        <input id="lcdp-ajust-coach-debut" class="lcdp-box-champ-formulaire__input" type="time" step="900" value="10:00" required>
                      </div>
                      <div class="lcdp-time-range__arrow" aria-hidden="true">→</div>
                      <div class="lcdp-box-champ-formulaire">
                        <label class="lcdp-box-champ-formulaire__label" for="lcdp-ajust-coach-fin">Fin</label>
                        <input id="lcdp-ajust-coach-fin" class="lcdp-box-champ-formulaire__input" type="time" step="900" value="18:00" required>
                      </div>
                    </div></div>
                  </section>

                  <div class="lcdp-box-champ-formulaire" data-capacite-zone>
                    <label class="lcdp-box-champ-formulaire__label" for="lcdp-ajust-coach-capacite">Capacité COACH</label>
                    <input id="lcdp-ajust-coach-capacite" class="lcdp-box-champ-formulaire__input" type="number" min="1" step="1">
                  </div>

                  <div class="lcdp-box-champ-formulaire">
                    <label class="lcdp-box-champ-formulaire__label" for="lcdp-ajust-coach-precision">Précision complémentaire facultative</label>
                    <textarea id="lcdp-ajust-coach-precision" class="lcdp-box-champ-formulaire__input" rows="3" placeholder="Ex. Cette règle ne concerne que les vacances scolaires."></textarea>
                    <button class="lcdp-button lcdp-button-secondary" type="button" data-dictee-cible="lcdp-ajust-coach-precision">Dicter</button>
                  </div>

                  <div class="lcdp-box-formulaire__actions">
                    <button id="lcdp-ajust-coach-analyser" class="lcdp-button lcdp-button-orange" type="submit">Analyser l’ajustement IA</button>
                  </div>
                </form>
              </section>
              
              <section id="lcdp-ajust-coach-validation" class="lcdp-box-formulaire" hidden>
                <header class="lcdp-box-formulaire__header">
                  <h2 class="lcdp-box-formulaire__title">Validation de l’ajustement COACH</h2>
                </header>
                <div id="lcdp-ajust-coach-resume"></div>
                <div id="lcdp-ajust-coach-alertes" class="lcdp-validation-bloc lcdp-validation-alertes" hidden></div>
                <details>
                  <summary>Voir le JSON proposé</summary>
                  <pre id="lcdp-ajust-coach-json"></pre>
                </details>
                <div class="lcdp-box-formulaire__actions">
                  <button id="lcdp-ajust-coach-corriger" class="lcdp-button lcdp-button-secondary" type="button">Corriger</button>
                  <button id="lcdp-ajust-coach-valider" class="lcdp-button lcdp-button-orange" type="button">Valider et écrire l’ajustement</button>
                </div>
              </section>
              <p id="lcdp-ajust-coach-status" role="status" aria-live="polite" hidden></p>


            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="lcdp-lightbox-slot"></div>
  </div>
</body>
</html>
