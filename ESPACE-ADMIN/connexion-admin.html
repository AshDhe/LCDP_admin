<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Connexion admin - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Connexion à l'espace admin La Clé du Parc.">

  <script src="../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function buildUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" + String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        buildUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;

      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;
      window.LCDP_buildUrl = buildUrl;

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return buildUrl(publicBase, path);
      };

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        if (typeof config.adminUrl === "function") {
          return config.adminUrl(path);
        }

        return buildUrl(adminBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return buildUrl(objetBase, path);
      };

      const feuillesCssObjet = [
        "/CSSBASE/cssbase.css",
        "/BOX/02-box-bandeau-nav.css",
        "/BOX/02-box-footer.css",
        "/BOX/03-box-formulaire.css",
        "/BOX/03-box-champ-formulaire.css",
        "/BOX/02-box-alerte.css"
      ];

      feuillesCssObjet.forEach((chemin) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(chemin) +
          '">'
        );
      });
    })();
  </script>
</head>

<body>
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main">
      <div id="lcdp-formulaire-connexion-admin-slot"></div>
    </main>

    <div id="lcdp-footer-slot"></div>
    <div id="lcdp-lightbox-slot"></div>

  </div>

  <script>
    (() => {
      "use strict";

      function estUrlExterneOuAncre(chemin) {
        const valeur = String(chemin || "");

        return (
          valeur.startsWith("#") ||
          valeur.startsWith("mailto:") ||
          valeur.startsWith("tel:") ||
          valeur.startsWith("http://") ||
          valeur.startsWith("https://") ||
          valeur.startsWith("data:")
        );
      }

      function construireUrlAdmin(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlAdmin === "function") {
          return window.LCDP_urlAdmin(valeur);
        }

        return valeur;
      }

      function construireUrlPublic(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlPublic === "function") {
          return window.LCDP_urlPublic(valeur);
        }

        return valeur;
      }

      function construireUrlObjet(chemin) {
        const valeur = String(chemin || "");

        if (!valeur || estUrlExterneOuAncre(valeur)) {
          return valeur;
        }

        if (typeof window.LCDP_urlObjet === "function") {
          return window.LCDP_urlObjet(valeur);
        }

        return valeur;
      }

      function appliquerRoutesSite(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const chemin = element.dataset.siteHref || "";
          const espace = element.dataset.space || "public";

          if (espace === "admin") {
            element.setAttribute("href", construireUrlAdmin(chemin));
            return;
          }

          element.setAttribute("href", construireUrlPublic(chemin));
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const chemin = element.dataset.siteSrc || "";
          const cheminObjet = chemin.replace(/^\/?OBJET\/?/, "/");
          element.setAttribute("src", construireUrlObjet(cheminObjet));
        });
      }

      async function chargerFragmentObjet(chemin) {
        const reponse = await fetch(construireUrlObjet(chemin), {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!reponse.ok) {
          throw new Error("Fragment OBJET introuvable : " + chemin);
        }

        const html = await reponse.text();
        const template = document.createElement("template");
        template.innerHTML = html.trim();

        return template.content.cloneNode(true);
      }

      async function chargerFragmentAdmin(chemin) {
        const reponse = await fetch(construireUrlAdmin(chemin), {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!reponse.ok) {
          throw new Error("Fragment ADMIN introuvable : " + chemin);
        }

        const html = await reponse.text();
        const template = document.createElement("template");
        template.innerHTML = html.trim();

        return template.content.cloneNode(true);
      }

      function chargerScriptObjetUneFois(chemin) {
        const src = construireUrlObjet(chemin);

        if (document.querySelector(`script[data-lcdp-script-objet="${chemin}"]`)) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScriptObjet = chemin;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Script OBJET introuvable : " + chemin));
          document.body.appendChild(script);
        });
      }

      function chargerScriptAdminUneFois(chemin) {
        const src = construireUrlAdmin(chemin);

        if (document.querySelector(`script[data-lcdp-script-admin="${chemin}"]`)) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScriptAdmin = chemin;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Script admin introuvable : " + chemin));
          document.body.appendChild(script);
        });
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const bandeau = await chargerFragmentAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/box-bandeau-nav-admin.html"
        );

        slot.appendChild(bandeau);
        appliquerRoutesSite(slot);
      }

      async function initialiserFooter() {
        const slot = document.getElementById("lcdp-footer-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const footer = await chargerFragmentObjet("/BOX/02-box-footer.html");
        slot.appendChild(footer);

        appliquerRoutesSite(slot);
      }

      window.LCDP_afficherAlerte = async function LCDP_afficherAlerte(titre, message, options = {}) {
        const slot = document.getElementById("lcdp-lightbox-slot");

        if (!slot) {
          return false;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentObjet("/BOX/02-box-alerte.html");
        slot.appendChild(fragment);

        const alerte = slot.querySelector("[data-lcdp-box-alerte]");
        const texte = slot.querySelector("[data-lcdp-alerte-message]");
        const boutonFermer = slot.querySelector("[data-lcdp-alerte-close]");
        const boutonOk = slot.querySelector("[data-lcdp-alerte-ok]");

        if (!alerte || !texte || !boutonFermer || !boutonOk) {
          slot.innerHTML = "";
          return false;
        }

        texte.textContent = message || titre || "Information";

        const fermer = () => {
          slot.innerHTML = "";

          if (options.redirectUrl) {
            window.location.href = options.redirectUrl;
          }
        };

        boutonFermer.addEventListener("click", fermer);
        boutonOk.addEventListener("click", fermer);

        alerte.addEventListener("click", (event) => {
          if (event.target === alerte) {
            fermer();
          }
        });

        document.addEventListener(
          "keydown",
          (event) => {
            if (event.key === "Escape") {
              fermer();
            }
          },
          { once: true }
        );

        return true;
      };

      async function initialiserFormulaireConnexion() {
        await chargerScriptObjetUneFois("/BOX/03-box-formulaire.js");

        if (typeof window.LCDP_creerFormulaire !== "function") {
          throw new Error("Créateur de formulaire V3 indisponible.");
        }

        await window.LCDP_creerFormulaire("lcdp-formulaire-connexion-admin-slot", {
          id: "formulaire-connexion-admin",
          ariaLabel: "Connexion admin",
          titre: "Connexion admin",
          sousTitre: "Accédez à l'espace d'administration",
          champs: [
            {
              label: "Identifiant admin",
              type: "email",
              id: "adminemail",
              name: "adminemail",
              placeholder: "Email",
              autocomplete: "username",
              required: true
            },
            {
              label: "Mot de passe",
              type: "password",
              id: "adminpwd",
              name: "adminpwd",
              placeholder: "Mot de passe",
              autocomplete: "current-password",
              required: true
            },
            {
              label: "Affichage",
              type: "checkbox",
              id: "afficher-mdp-admin",
              name: "afficher-mdp-admin",
              checkboxLabel: "Afficher le mot de passe"
            }
          ],
          bouton: {
            id: "bouton-valider-formulaire",
            type: "submit",
            label: "Connexion",
            style: "lcdp-button-primary"
          }
        });
      }

      async function initialiserPage() {
        await initialiserBandeau();
        await initialiserFooter();
        await initialiserFormulaireConnexion();
        await chargerScriptAdminUneFois("/ESPACE-ADMIN/connexion-admin.js");
      }

      initialiserPage().catch((erreur) => {
        console.error(erreur);
      });
    })();
  </script>
</body>
</html>
