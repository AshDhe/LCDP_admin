<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">

  <title>Connexion admin - La Clé du Parc</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Connexion à l’espace admin La Clé du Parc.">

  <script src="../config.js"></script>

  <script>
    (() => {
      "use strict";

      const config = window.SITE_CONFIG || {};

      function nettoyerBaseUrl(value) {
        return String(value || "").replace(/\/+$/, "");
      }

      function construireUrl(base, path) {
        return nettoyerBaseUrl(base) + "/" +
          String(path || "").replace(/^\/+/, "");
      }

      const adminBase = nettoyerBaseUrl(
        config.adminBaseUrl ||
        config.ADMIN_BASE ||
        config.siteBase ||
        ""
      );

      const publicBase = nettoyerBaseUrl(
        config.publicBaseUrl ||
        config.PUBLIC_BASE ||
        ""
      );

      const objetBase = nettoyerBaseUrl(
        config.objetBaseUrl ||
        config.OBJET_BASE ||
        construireUrl(publicBase, "/OBJET")
      );

      window.SITE_BASE = adminBase;
      window.LCDP_ADMIN_BASE = adminBase;
      window.LCDP_PUBLIC_BASE = publicBase;
      window.LCDP_OBJET_BASE = objetBase;

      window.LCDP_urlAdmin = function LCDP_urlAdmin(path) {
        if (typeof config.adminUrl === "function") {
          return config.adminUrl(path);
        }

        return construireUrl(adminBase, path);
      };

      window.LCDP_urlPublic = function LCDP_urlPublic(path) {
        if (typeof config.publicUrl === "function") {
          return config.publicUrl(path);
        }

        return construireUrl(publicBase, path);
      };

      window.LCDP_urlObjet = function LCDP_urlObjet(path) {
        if (typeof config.objetUrl === "function") {
          return config.objetUrl(path);
        }

        return construireUrl(objetBase, path);
      };

      ["/CSSBASE/cssbase.css", "/BOX/02-box-bandeau-nav.css", "/BOX/03-box-formulaire.css", "/BOX/03-box-champ-formulaire.css", "/BOX/02-box-alerte.css"].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlObjet(path) +
          '">'
        );
      });

      ["/ESPACE-ADMIN/A_STRUCTURE/css-admin.css"].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlAdmin(path) +
          '">'
        );
      });

      [].forEach((path) => {
        document.write(
          '<link rel="stylesheet" href="' +
          window.LCDP_urlAdmin(path) +
          '">'
        );
      });


    })();
  </script>
</head>
<body class="lcdp-page-connexion-admin">
  <div class="lcdp-site-page">

    <div id="lcdp-bandeau-slot"></div>

    <main class="lcdp-site-main">
      <section class="lcdp-page-section" aria-label="Connexion admin">
        <div class="lcdp-page-container">
          <div class="lcdp-page-content">

            <div id="lcdp-formulaire-connexion-admin-slot"></div>

          </div>
        </div>
      </section>
    </main>

    <div id="lcdp-lightbox-slot"></div>

  </div>

  <script>
    (() => {
      "use strict";

      function urlAdmin(path) {
        return typeof window.LCDP_urlAdmin === "function"
          ? window.LCDP_urlAdmin(path)
          : path;
      }

      function urlPublic(path) {
        return typeof window.LCDP_urlPublic === "function"
          ? window.LCDP_urlPublic(path)
          : path;
      }

      function urlObjet(path) {
        return typeof window.LCDP_urlObjet === "function"
          ? window.LCDP_urlObjet(path)
          : path;
      }

      function appliquerRoutes(racine = document) {
        racine.querySelectorAll("[data-site-href]").forEach((element) => {
          const path = element.dataset.siteHref || "";
          const space = element.dataset.space || "public";

          element.setAttribute(
            "href",
            space === "admin" ? urlAdmin(path) : urlPublic(path)
          );
        });

        racine.querySelectorAll("[data-site-src]").forEach((element) => {
          const path = String(element.dataset.siteSrc || "")
            .replace(/^\/?OBJET\/?/, "/");

          element.setAttribute("src", urlObjet(path));
        });
      }

      async function chargerFragment(url, libelle) {
        const response = await fetch(url, {
          method: "GET",
          credentials: "omit",
          cache: "no-cache"
        });

        if (!response.ok) {
          throw new Error(libelle + " introuvable.");
        }

        const template = document.createElement("template");
        template.innerHTML = (await response.text()).trim();

        return template.content.cloneNode(true);
      }

      function chargerFragmentAdmin(path) {
        return chargerFragment(
          urlAdmin(path),
          "Fragment ADMIN " + path
        );
      }

      function chargerFragmentObjet(path) {
        return chargerFragment(
          urlObjet(path),
          "Fragment OBJET " + path
        );
      }

      function chargerScriptAdminUneFois(path) {
        const src = urlAdmin(path);

        if (
          document.querySelector(
            `script[data-lcdp-script-admin="${path}"]`
          )
        ) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScriptAdmin = path;
          script.onload = resolve;
          script.onerror = () => reject(
            new Error("Script ADMIN introuvable : " + path)
          );
          document.body.appendChild(script);
        });
      }

      async function initialiserBandeau() {
        const slot = document.getElementById("lcdp-bandeau-slot");

        if (!slot) {
          return;
        }

        slot.innerHTML = "";

        const fragment = await chargerFragmentAdmin(
          "/ESPACE-ADMIN/A_STRUCTURE/box-bandeau-nav-admin.html"
        );

        slot.appendChild(fragment);
        appliquerRoutes(slot);
      }
      function chargerScriptObjetUneFois(path) {
        const src = urlObjet(path);

        if (
          document.querySelector(
            `script[data-lcdp-script-objet="${path}"]`
          )
        ) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.defer = true;
          script.dataset.lcdpScriptObjet = path;
          script.onload = resolve;
          script.onerror = () => reject(
            new Error("Script OBJET introuvable : " + path)
          );
          document.body.appendChild(script);
        });
      }

      window.LCDP_afficherAlerte =
        async function LCDP_afficherAlerte(
          titre,
          message,
          options = {}
        ) {
          const slot = document.getElementById("lcdp-lightbox-slot");

          if (!slot) {
            return false;
          }

          slot.innerHTML = "";

          const fragment = await chargerFragmentObjet(
            "/BOX/02-box-alerte.html"
          );

          slot.appendChild(fragment);

          const alerte = slot.querySelector("[data-lcdp-box-alerte]");
          const texte = slot.querySelector("[data-lcdp-alerte-message]");
          const boutonFermer = slot.querySelector(
            "[data-lcdp-alerte-close]"
          );
          const boutonOk = slot.querySelector("[data-lcdp-alerte-ok]");

          if (!alerte || !texte || !boutonFermer || !boutonOk) {
            slot.innerHTML = "";
            return false;
          }

          texte.textContent = message || titre || "Information";

          const fermer = () => {
            slot.innerHTML = "";

            if (options.redirectUrl) {
              window.location.href = options.redirectUrl;
            }
          };

          boutonFermer.addEventListener("click", fermer);
          boutonOk.addEventListener("click", fermer);

          alerte.addEventListener("click", (event) => {
            if (event.target === alerte) {
              fermer();
            }
          });

          document.addEventListener(
            "keydown",
            (event) => {
              if (event.key === "Escape") {
                fermer();
              }
            },
            { once: true }
          );

          return true;
        };

      async function initialiserFormulaireConnexion() {
        await chargerScriptObjetUneFois("/BOX/03-box-formulaire.js");

        if (typeof window.LCDP_creerFormulaire !== "function") {
          throw new Error("Créateur de formulaire V3 indisponible.");
        }

        await window.LCDP_creerFormulaire(
          "lcdp-formulaire-connexion-admin-slot",
          {
            id: "formulaire-connexion-admin",
            ariaLabel: "Connexion admin",
            titre: "Connexion admin",
            sousTitre: "Accédez à l’espace d’administration",
            champs: [
              {
                label: "Identifiant admin",
                type: "email",
                id: "adminemail",
                name: "adminemail",
                placeholder: "Email",
                autocomplete: "username",
                required: true
              },
              {
                label: "Mot de passe",
                type: "password",
                id: "adminpwd",
                name: "adminpwd",
                placeholder: "Mot de passe",
                autocomplete: "current-password",
                required: true
              },
              {
                label: "Affichage",
                type: "checkbox",
                id: "afficher-mdp-admin",
                name: "afficher-mdp-admin",
                checkboxLabel: "Afficher le mot de passe"
              }
            ],
            bouton: {
              id: "bouton-valider-formulaire",
              type: "submit",
              label: "Connexion",
              style: "lcdp-button-primary"
            }
          }
        );
      }

      async function initialiserPage() {
        await initialiserBandeau();
        await initialiserFormulaireConnexion();
        await chargerScriptAdminUneFois(
          "/ESPACE-ADMIN/connexion-admin.js"
        );
      }

      initialiserPage().catch((error) => {
        console.error(error);
      });
    })();
  </script>
</body>
</html>
